<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipe Cookbook</title>

<link rel="stylesheet" href="css/home.css" />
</head>

<body>

<header id="topBar">
  <div class="logo">🍳 CookBook</div>
</header>

<!-- HERO / CAROUSEL -->
<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">
    <button class="nav-arrow left">‹</button>
    <div class="carousel-track"></div>
    <button class="nav-arrow right">›</button>
  </div>

  <div class="recipe-info">
    <h2 class="recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

  <button class="scroll-down">↓ Explore Recipes</button>

</section>

<!-- TOOLS + GRID -->
<section id="tools" class="tools-section">

  <div class="tools-header">
    <div class="logo-small">🍳 CookBook</div>
    <input type="text" id="searchBar" placeholder="Search recipes..." />
  </div>

  <div id="categoryBar" class="category-bar"></div>

  <div id="recipeGrid" class="recipe-grid"></div>

</section>

<script src="js/home.js"></script>

</body>
</html>
