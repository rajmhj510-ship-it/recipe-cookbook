<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#111827;
}

header img{
width:40px;
height:40px;
border-radius:8px;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin:8px 0 0;
}

.card small{
opacity:0.7;
}
</style>
</head>

<body>

<header>
<img src="./logo.png" alt="logo">
<h2>Recipe Cookbook</h2>
</header>

<div class="container" id="list">
Loading...
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const res = await fetch("./data/index.json");
const recipes = await res.json();

const list = document.getElementById("list");

list.innerHTML = recipes.map(r => `
<div class="card" onclick="openRecipe('${r.file}')">
<img src="${r.image}" alt="">
<h3>${r.title}</h3>
<small>${r.category}</small>
</div>
`).join("");

});

function openRecipe(file){
window.location.href = "recipe.html?file=" + encodeURIComponent(file);
}
</script>

</body>
</html>
