<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digital Cookbook</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0b0f14;
  color:#fff;
  padding:20px;
}

.paper{
  max-width:1100px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

/* FILTERS */
#filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:15px;
}

#filters button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#1b2430;
  color:#fff;
  font-size:12px;
  transition:0.2s;
}

#filters button:hover{
  background:#2b6fff;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:#151c25;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  transition:0.25s;
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-6px);
  background:#1b2430;
}

.card h3{
  margin:0;
  font-size:16px;
}

.meta{
  font-size:12px;
  opacity:0.7;
  margin-top:6px;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 10px;
  font-size:11px;
  background:#2b6fff;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<!-- FILTERS -->
<div id="filters">
  <button onclick="setFilter('All')">🌍 All</button>
  <button onclick="setFilter('Arabic')">🇸🇦 Arabic</button>
  <button onclick="setFilter('Chinese')">🇨🇳 Chinese</button>
  <button onclick="setFilter('Continental')">🍽 Continental</button>
  <button onclick="setFilter('Indian')">🇮🇳 Indian</button>
  <button onclick="setFilter('Mexican')">🇲🇽 Mexican</button>
  <button onclick="setFilter('Thai')">🇹🇭 Thai</button>
  <button onclick="setFilter('Italian')">🇮🇹 Italian</button>
  <button onclick="setFilter('Nepali')">🇳🇵 Nepali</button>
</div>

<!-- SEARCH -->
<input id="searchBox" placeholder="Search recipes..." />

<!-- GRID -->
<div id="recipeGrid">Loading...</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const grid = document.getElementById("recipeGrid");

let recipes = [];
let activeFilter = "All";

/* LOAD DATA */
try {
  const res = await fetch("./data/arabic-recipes.json");
  recipes = await res.json();
  render(recipes);
} catch (err) {
  grid.innerHTML = "❌ Failed to load JSON";
}

/* FILTER FUNCTION */
function setFilter(cat){
  activeFilter = cat;

  let filtered = recipes;

  if(cat !== "All"){
    filtered = recipes.filter(r => r.category === cat);
  }

  render(filtered);
}

window.setFilter = setFilter;

/* RENDER */
function render(list){
  grid.innerHTML = "";

  if(list.length === 0){
    grid.innerHTML = "No recipes found";
    return;
  }

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card">
        <h3>${r.title}</h3>
        <div class="meta">${r.time} • ${r.difficulty}</div>
        <div class="badge">${r.category}</div>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", (e) => {

  const val = e.target.value.toLowerCase();

  let filtered = recipes;

  /* apply category first */
  if(activeFilter !== "All"){
    filtered = filtered.filter(r => r.category === activeFilter);
  }

  /* then search */
  filtered = filtered.filter(r =>
    r.title.toLowerCase().includes(val)
  );

  render(filtered);
});

});
</script>

</body>
</html>
