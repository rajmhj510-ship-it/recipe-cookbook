<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#111827;
flex-wrap:wrap;
}

header img{
width:40px;
height:40px;
border-radius:8px;
}

/* SEARCH */
.search-box{
width:100%;
margin-top:10px;
}

.search-box input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

/* FILTER BUTTONS */
.filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.filters button{
padding:6px 10px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
cursor:pointer;
font-size:12px;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin:8px 0 0;
}

.card small{
opacity:0.7;
}
</style>
</head>

<body>

<header>
<img src="./logo.png" alt="logo">
<h2>Recipe Cookbook</h2>

<div class="search-box">
<input type="text" id="search" placeholder="Search recipes...">
</div>

<div class="filters" id="filters"></div>
</header>

<div class="container" id="list">Loading...</div>

<script>

let allRecipes = [];
let activeCategory = "All";

document.addEventListener("DOMContentLoaded", async () => {

const container = document.getElementById("list");

try {
const res = await fetch("./data/index.json");
allRecipes = await res.json();

renderFilters();
renderRecipes(allRecipes);

document.getElementById("search").addEventListener("input", filterRecipes);

} catch (err) {
console.error(err);
container.innerHTML = "❌ Failed to load recipes";
}
});

/* FILTER BUTTONS */
function renderFilters(){
const categories = ["All", ...new Set(allRecipes.map(r => r.category))];

document.getElementById("filters").innerHTML =
categories.map(c => `
<button onclick="setCategory('${c}')" class="${c==='All'?'active':''}">
${c}
</button>
`).join("");
}

function setCategory(cat){
activeCategory = cat;

document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
event.target.classList.add("active");

filterRecipes();
}

/* SEARCH + CATEGORY FILTER */
function filterRecipes(){
const search = document.getElementById("search").value.toLowerCase();

let filtered = allRecipes.filter(r => {

const matchCategory = activeCategory === "All" || r.category === activeCategory;
const matchSearch = r.title.toLowerCase().includes(search);

return matchCategory && matchSearch;
});

renderRecipes(filtered);
}

/* RENDER */
function renderRecipes(list){
const container = document.getElementById("list");

container.innerHTML = list.map(r => `
<div class="card" onclick="openRecipe('${r.file}')">
<img src="${r.image}">
<h3>${r.title}</h3>
<small>${r.category}</small>
</div>
`).join("");
}

function openRecipe(file){
window.location.href = "recipe.html?file=" + encodeURIComponent(file);
}

</script>

</body>
</html>
