<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
position:relative;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:opacity 0.5s ease;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
z-index:2;
}

.logo{
width:60px;
height:60px;
border-radius:12px;
margin-bottom:10px;
}

.hero h1{
margin:0;
font-size:26px;
}

.hero p{
opacity:0.8;
margin-top:6px;
}

/* ENTER BUTTON */
.enter-btn{
position:absolute;
bottom:25px;
z-index:2;
background:#ffcc70;
color:#000;
padding:10px 16px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
}

/* MAIN APP */
#main{
display:none;
padding:15px;
}

/* SEARCH */
.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
margin-bottom:10px;
}

/* FILTERS */
.filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

.filters button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
cursor:pointer;
font-size:12px;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin:6px 0 0;
}

.card small{
opacity:0.7;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">

  <div class="hero-content">
    <img src="./logo.png" class="logo">
    <h1>Cook like a chef 👨‍🍳</h1>
    <p>Explore global recipes and step-by-step cooking guides</p>
  </div>

  <div class="enter-btn" onclick="enterApp()">
    Enter Recipes →
  </div>

</div>

<!-- MAIN APP -->
<div id="main">

  <div class="search-box">
    <input id="search" placeholder="Search recipes...">
  </div>

  <div class="filters" id="filters"></div>

  <div class="container" id="list"></div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
