<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#111827;
}

header img{
width:40px;
height:40px;
border-radius:8px;
}

.top-bar{
display:flex;
flex-direction:column;
gap:10px;
padding:10px 15px;
}

input{
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.filter-btn{
padding:6px 12px;
border-radius:20px;
border:none;
cursor:pointer;
background:#222c3a;
color:#fff;
font-size:12px;
}

.filter-btn.active{
background:#ffcc70;
color:#000;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin:8px 0 0;
}

.card small{
opacity:0.7;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<h2>Recipe Cookbook</h2>
</header>

<div class="top-bar">

<input type="text" id="search" placeholder="Search recipes...">

<div class="filters" id="filters"></div>

</div>

<div class="container" id="list">Loading...</div>

<script>

let allRecipes = [];
let activeCategory = "All";

document.addEventListener("DOMContentLoaded", async () => {

const container = document.getElementById("list");

try {
const res = await fetch("./data/index.json");
allRecipes = await res.json();

createFilters();
render(allRecipes);

} catch (err) {
console.error(err);
container.innerHTML = "❌ Failed to load recipes";
}
});

/* SEARCH */
document.getElementById("search").addEventListener("input", function () {
render(filterData());
});

/* CREATE FILTER BUTTONS */
function createFilters(){
const categories = ["All", ...new Set(allRecipes.map(r => r.category))];

const filters = document.getElementById("filters");

filters.innerHTML = categories.map(c => `
<button class="filter-btn ${c==="All"?"active":""}" onclick="setFilter('${c}')">
${c}
</button>
`).join("");
}

function setFilter(cat){
activeCategory = cat;

document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
event.target.classList.add("active");

render(filterData());
}

/* FILTER LOGIC */
function filterData(){
const search = document.getElementById("search").value.toLowerCase();

return allRecipes.filter(r => {

const matchCategory = activeCategory === "All" || r.category === activeCategory;
const matchSearch = r.title.toLowerCase().includes(search);

return matchCategory && matchSearch;
});
}

/* RENDER */
function render(data){
const container = document.getElementById("list");

container.innerHTML = data.map(r => `
<div class="card" onclick="openRecipe('${r.file}')">
<img src="${r.image}">
<h3>${r.title}</h3>
<small>${r.category}</small>
</div>
`).join("");
}

function openRecipe(file){
window.location.href = "recipe.html?file=" + encodeURIComponent(file);
}

</script>

</body>
</html>
