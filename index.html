<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Cookbook</title>

  <link rel="stylesheet" href="css/home.css" />
</head>

<body>

<!-- ================= HERO ================= -->
<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">

    <button class="nav-arrow left" aria-label="Previous recipe">‹</button>

    <div class="carousel-track">
      <!-- JS injects cards -->
    </div>

    <button class="nav-arrow right" aria-label="Next recipe">›</button>

  </div>

  <div class="recipe-info">
    <h2 class="recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

  <button class="scroll-down" id="scrollDownBtn">
    ↓ Scroll Down
  </button>

</section>

<!-- ================= SEARCH SECTION ================= -->
<section id="search-section">

  <!-- LOGO -->
  <div class="logo-wrapper">
    <img src="logo.png" alt="Recipe Logo" class="site-logo">
  </div>

  <h2>Search Recipes</h2>

  <!-- SEARCH -->
  <input
    type="text"
    id="searchInput"
    placeholder="Search recipes..."
    autocomplete="off"
  />

  <!-- FILTERS -->
  <div class="filters" id="categoryFilters">

    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="Arabic">Arabic</button>
    <button class="filter-btn" data-category="Chinese">Chinese</button>
    <button class="filter-btn" data-category="Continental">Continental</button>
    <button class="filter-btn" data-category="Indian">Indian</button>
    <button class="filter-btn" data-category="Italian">Italian</button>
    <button class="filter-btn" data-category="Mexican">Mexican</button>
    <button class="filter-btn" data-category="Nepali">Nepali</button>
    <button class="filter-btn" data-category="Thai">Thai</button>

  </div>

  <!-- RESULTS -->
  <div class="search-results" id="searchResults"></div>

</section>

<script src="js/home.js"></script>

</body>
</html>
