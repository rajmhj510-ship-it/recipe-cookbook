<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
width:100%;
position:relative;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
transition:0.6s ease;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

.hero h1{
font-size:26px;
margin-bottom:10px;
}

.hero p{
font-size:14px;
opacity:0.9;
}

/* SCROLL BUTTON */
.scroll-btn{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:25px;
background:#ffcc70;
color:#000;
font-weight:bold;
cursor:pointer;
}

/* MAIN APP */
#app{
display:none;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* HEADER */
header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:40px;
height:40px;
border-radius:8px;
}

/* SEARCH */
.search-box{
padding:10px 15px;
}

.search-box input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#1b2430;
color:#fff;
outline:none;
}

/* FILTERS */
.filters{
display:flex;
gap:8px;
overflow-x:auto;
padding:10px 15px;
}

.filters button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
white-space:nowrap;
cursor:pointer;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

/* GRID */
.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin:8px 0 0;
}

.card small{
opacity:0.7;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-content">
    <h1>Cook like a chef 👨‍🍳</h1>
    <p>Explore global recipes and step-by-step cooking guides</p>
    <button class="scroll-btn" onclick="enterApp()">⬇ Explore Recipes</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

<header>
<img src="./logo.png">
<h2>Recipe Cookbook</h2>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search recipes...">
</div>

<div class="filters" id="filters"></div>

<div class="container" id="list"></div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
