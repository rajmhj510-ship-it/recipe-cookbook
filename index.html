<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
/* your existing styles remain unchanged */
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="heroSlide">
  <div class="hero-content">
    <img src="./logo.png" class="logo">
    <h1>Cook like a chef 👨‍🍳</h1>
    <p>Explore global recipes and step-by-step cooking guides</p>
  </div>

  <div class="scroll-down" onclick="goToApp()">
    ⬇ Scroll Down
  </div>
</div>

<!-- MAIN APP -->
<div id="appSection">
  <div class="search-box">
    <input id="search" placeholder="Search recipes...">
  </div>

  <div class="filters" id="filters"></div>
  <div class="container" id="list"></div>
</div>

<script src="./js/index.js"></script>

<!-- 🚫 ANTI COPY PROTECTION -->
<script>
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key === "u") e.preventDefault();
  if(e.ctrlKey && e.key === "s") e.preventDefault();
  if(e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
  if(e.key === "F12") e.preventDefault();
});
</script>

</body>
</html>
