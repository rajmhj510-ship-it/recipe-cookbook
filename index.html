<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Carousel FIXED</title>

<style>
body{
margin:0;
background:#fff;
overflow:hidden;
}

.stack{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:220px;
height:300px;
border-radius:18px;
object-fit:cover;
box-shadow:0 15px 40px rgba(0,0,0,0.15);

/* IMPORTANT SMOOTH MOTION */
transition: all 0.8s cubic-bezier(0.22,1,0.36,1);

/* ALL BW BY DEFAULT */
filter:grayscale(1);
}
</style>
</head>

<body>

<div class="stack" id="stack"></div>

<script src="./js/index.js"></script>

</body>
</html>
