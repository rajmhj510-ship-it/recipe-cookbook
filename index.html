<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#111827;
}

header img{
width:40px;
height:40px;
border-radius:8px;
}

/* SEARCH BAR */
.search-box{
padding:10px 15px;
background:#0f1722;
position:sticky;
top:0;
z-index:10;
}

.search-box input{
width:100%;
padding:10px 12px;
border-radius:8px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
font-size:14px;
}

/* GRID */
.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin:8px 0 0;
}

.card small{
opacity:0.7;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<h2>Recipe Cookbook</h2>
</header>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search recipes... (e.g. Falafel, Chinese, Chicken)">
</div>

<div class="container" id="list">Loading...</div>

<script>

let ALL_RECIPES = [];

document.addEventListener("DOMContentLoaded", async () => {

const list = document.getElementById("list");
const search = document.getElementById("search");

try {
const res = await fetch("./data/index.json");
if(!res.ok) throw new Error("Index load failed");

ALL_RECIPES = await res.json();

render(ALL_RECIPES);

/* LIVE SEARCH */
search.addEventListener("input", (e) => {
const value = e.target.value.toLowerCase().trim();

const filtered = ALL_RECIPES.filter(r => {
return (
r.title.toLowerCase().includes(value) ||
r.category.toLowerCase().includes(value)
);
});

render(filtered);
});

} catch(err){
console.error(err);
list.innerHTML = "❌ Failed to load recipes";
}

});

/* RENDER FUNCTION */
function render(data){

const list = document.getElementById("list");

if(!data.length){
list.innerHTML = "No recipes found";
return;
}

list.innerHTML = data.map(r => `
<div class="card" onclick="openRecipe('${r.file}')">
<img src="${r.image}">
<h3>${r.title}</h3>
<small>${r.category}</small>
</div>
`).join("");
}

function openRecipe(file){
window.location.href = "recipe.html?file=" + encodeURIComponent(file);
}

</script>

</body>
</html>
