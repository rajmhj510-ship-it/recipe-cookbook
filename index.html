<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Stack Carousel</title>

<style>
body{
margin:0;
background:#fff;
overflow:hidden;
font-family:Arial;
}

/* STACK AREA */
.stack{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* BASE CARD */
.card{
position:absolute;
width:220px;
height:300px;
object-fit:cover;
border-radius:18px;
transition:all 0.6s ease;
box-shadow:0 15px 40px rgba(0,0,0,0.15);

/* IMPORTANT: NO TRANSPARENCY */
opacity:1;
}

/* CENTER (BIG + COLOR) */
.center{
transform:translateX(0) scale(1.2);
z-index:10;
filter:grayscale(0);
}

/* LEFT SIDE (GRAYSCALE ONLY) */
.l1{
transform:translateX(-140px) scale(0.95);
z-index:9;
filter:grayscale(1);
}

.l2{
transform:translateX(-260px) scale(0.85);
z-index:8;
filter:grayscale(1);
}

.l3{
transform:translateX(-380px) scale(0.75);
z-index:7;
filter:grayscale(1);
}

/* RIGHT SIDE (GRAYSCALE ONLY) */
.r1{
transform:translateX(140px) scale(0.95);
z-index:9;
filter:grayscale(1);
}

.r2{
transform:translateX(260px) scale(0.85);
z-index:8;
filter:grayscale(1);
}

.r3{
transform:translateX(380px) scale(0.75);
z-index:7;
filter:grayscale(1);
}
</style>
</head>

<body>

<div class="stack" id="stack"></div>

<script src="./js/index.js"></script>

</body>
</html>
