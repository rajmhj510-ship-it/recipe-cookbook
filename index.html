<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Cookbook</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#0b0f14;
color:#fff;
padding:20px;
}

.paper{max-width:1100px;margin:auto;}

h1{text-align:center;margin-bottom:20px;}

#filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

#filters button{
padding:8px 12px;
border:none;
border-radius:20px;
cursor:pointer;
background:#1b2430;
color:#fff;
font-size:12px;
}

#searchBox{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:20px;
}

#recipeGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.card{
background:#151c25;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:16px;
}

.meta{
padding:0 10px 10px;
font-size:12px;
opacity:0.7;
}

.badge{
margin:0 10px 10px;
display:inline-block;
padding:4px 10px;
font-size:11px;
background:#2b6fff;
border-radius:20px;
}
</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<div id="filters">
<button onclick="setFilter('All')">🌍 All</button>
<button onclick="setFilter('Chinese')">🇨🇳 Chinese</button>
<button onclick="setFilter('Middle Eastern')">🥙 Middle Eastern</button>
</div>

<input id="searchBox" placeholder="Search recipes..." />

<div id="recipeGrid">Loading...</div>

</div>

<script>
let recipes = [];
let activeFilter = "All";

const grid = document.getElementById("recipeGrid");

window.openRecipe = function(id){
window.location.href = "recipe.html?id=" + id;
};

window.setFilter = function(cat){
activeFilter = cat;
render(getFiltered());
};

function getFiltered(){
let list = recipes;

if(activeFilter !== "All"){
list = list.filter(r => r.category === activeFilter);
}

return list;
}

function render(list){
grid.innerHTML = "";

if(!list.length){
grid.innerHTML = "No recipes found";
return;
}

list.forEach(r => {
grid.innerHTML += `
<div class="card" onclick="openRecipe(${r.id})">
<img src="${r.image}">
<h3>${r.title}</h3>
<div class="meta">${r.time} • ${r.difficulty}</div>
<div class="badge">${r.category}</div>
</div>
`;
});
}

document.addEventListener("DOMContentLoaded", async () => {
try{
const res = await fetch("./data/recipes.json");
recipes = await res.json();
render(recipes);
}catch(e){
grid.innerHTML = "Failed to load recipes";
}
});
</script>

</body>
</html>
