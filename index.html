<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
display:flex;
align-items:center;
gap:10px;
padding:12px 15px;
background:rgba(17,24,39,0.5);
backdrop-filter: blur(10px);
transition: transform 0.3s ease;
}

header.hide{
transform: translateY(-100%);
}

header img{
width:38px;
height:38px;
border-radius:8px;
}

/* HERO */
.hero{
height:100vh;
position:relative;
overflow:hidden;
}

/* VIDEO */
.hero video{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.55);
}

/* IMAGE PREVIEW OVERLAY */
.hero-preview{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
opacity:0.35;
pointer-events:none;
}

.hero-preview img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s ease;
}

.hero-preview img.active{
opacity:1;
}

/* OVERLAY TEXT */
.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
z-index:2;
}

.overlay img{
width:80px;
height:80px;
border-radius:12px;
margin-bottom:12px;
}

.overlay h1{
font-size:26px;
margin:10px 0;
}

.overlay p{
font-size:14px;
opacity:0.85;
line-height:1.5;
}

/* SCROLL */
.scroll-down{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:0.85;
cursor:pointer;
animation:bounce 1.5s infinite;
z-index:2;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0);}
50%{transform:translate(-50%,8px);}
}

/* CONTENT */
#contentSection{
padding-top:70px;
}

/* SEARCH */
.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
}

/* FILTERS */
.filters{
display:flex;
gap:8px;
overflow-x:auto;
padding:10px 15px;
}

.filters button{
flex:0 0 auto;
padding:8px 14px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
font-size:12px;
cursor:pointer;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

/* GRID */
.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:8px;
}

.card small{
margin:0 8px 10px;
display:block;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe Cookbook</strong>
</header>

<!-- HERO -->
<div class="hero">

<video autoplay muted loop playsinline>
<source src="assets/video/food.mp4" type="video/mp4">
</video>

<!-- IMAGE PREVIEW LAYER -->
<div class="hero-preview" id="heroPreview"></div>

<!-- TEXT -->
<div class="overlay">
<img src="./logo.png">
<h1>Cook like a chef 👨‍🍳</h1>
<p>Explore global recipes and step-by-step cooking guides</p>
</div>

<!-- SCROLL -->
<div class="scroll-down" onclick="scrollDown()">
⬇ Scroll down
</div>

</div>

<!-- CONTENT -->
<div id="contentSection">

<div class="search-box">
<input type="text" id="search" placeholder="Search recipes...">
</div>

<div class="filters" id="filters"></div>

<div class="container" id="list">Loading...</div>

</div>

<script>

let allRecipes = [];
let activeCategory = "All";
let lastScrollY = window.scrollY;
const header = document.querySelector("header");

/* LOAD DATA */
document.addEventListener("DOMContentLoaded", async () => {

const res = await fetch("./data/index.json");
allRecipes = await res.json();

renderFilters();
renderRecipes(allRecipes);
initHeroImages();

document.getElementById("search").addEventListener("input", filterRecipes);
});

/* SCROLL DOWN */
function scrollDown(){
document.getElementById("contentSection").scrollIntoView({
behavior: "smooth"
});
}

/* HEADER AUTO HIDE */
window.addEventListener("scroll", () => {
const currentScrollY = window.scrollY;

if (currentScrollY > lastScrollY && currentScrollY > 80) {
header.classList.add("hide");
} else {
header.classList.remove("hide");
}

lastScrollY = currentScrollY;
});

/* HERO IMAGE SLIDER */
function initHeroImages(){
const heroImages = [
"assets/images/arabic/falafel.png",
"assets/images/arabic/hummus.png",
"assets/images/arabic/chicken-shawarma.png",
"assets/images/chinese/kung-pao-chicken.png",
"assets/images/continental/pancakes.png"
];

const preview = document.getElementById("heroPreview");

heroImages.forEach((src, i) => {
const img = document.createElement("img");
img.src = src;
if(i === 0) img.classList.add("active");
preview.appendChild(img);
});

let index = 0;

setInterval(() => {
const imgs = document.querySelectorAll(".hero-preview img");

imgs.forEach(img => img.classList.remove("active"));

index = (index + 1) % heroImages.length;
imgs[index].classList.add("active");

}, 3000);
}

/* FILTERS */
function renderFilters(){
const categories = ["All", ...new Set(allRecipes.map(r => r.category))];

document.getElementById("filters").innerHTML =
categories.map(c => `
<button onclick="setCategory(event,'${c}')" class="${c==='All'?'active':''}">
${c}
</button>
`).join("");
}

function setCategory(e, cat){
activeCategory = cat;

document.querySelectorAll(".filters button")
.forEach(b => b.classList.remove("active"));

e.target.classList.add("active");

filterRecipes();
}

function filterRecipes(){
const search = document.getElementById("search").value.toLowerCase();

let filtered = allRecipes.filter(r =>
(activeCategory === "All" || r.category === activeCategory) &&
r.title.toLowerCase().includes(search)
);

renderRecipes(filtered);
}

/* RENDER RECIPES */
function renderRecipes(list){
document.getElementById("list").innerHTML =
list.map(r => `
<div class="card" onclick="openRecipe('${r.file}')">
<img src="${r.image}">
<h3>${r.title}</h3>
<small>${r.category}</small>
</div>
`).join("");
}

/* OPEN RECIPE */
function openRecipe(file){
window.location.href = "recipe.html?file=" + encodeURIComponent(file);
}

</script>

</body>
</html>
