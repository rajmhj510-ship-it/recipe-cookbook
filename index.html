<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
display:flex;
align-items:center;
gap:10px;
padding:12px 15px;
background:rgba(17,24,39,0.5);
backdrop-filter: blur(10px);
}

header img{
width:38px;
height:38px;
border-radius:8px;
}

/* HERO */
.hero{
height:100vh;
width:100%;
position:relative;
overflow:hidden;
}

.hero video{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.55);
}

/* OVERLAY CONTENT */
.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

.overlay img{
width:80px;
height:80px;
border-radius:12px;
margin-bottom:15px;
}

.overlay h1{
font-size:26px;
margin:10px 0;
}

.overlay p{
font-size:14px;
opacity:0.85;
line-height:1.5;
}

/* SCROLL INDICATOR */
.scroll-down{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:0.8;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0);}
50%{transform:translate(-50%,8px);}
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe Cookbook</strong>
</header>

<!-- HERO -->
<div class="hero">

<video autoplay muted loop playsinline>
<source src="assets/video/food.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="overlay">
<img src="./logo.png" alt="logo">
<h1>Cook like a chef 👨‍🍳</h1>
<p>Explore global recipes and step-by-step cooking guides</p>
</div>

<!-- SCROLL -->
<div class="scroll-down">⬇ Scroll down</div>

</div>

</body>
</html>
