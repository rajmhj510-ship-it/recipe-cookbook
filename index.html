<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipe Cookbook</title>

<link rel="stylesheet" href="css/carousel.css" />
<link rel="stylesheet" href="css/home.css" />
</head>

<body>

<!-- ================= HERO ================= -->
<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">
    <button class="nav-arrow left">‹</button>
    <div class="carousel-track"></div>
    <button class="nav-arrow right">›</button>
  </div>

  <div class="recipe-info">
    <h2 class="hero-recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

  <button class="scroll-down">↓ Explore Recipes</button>

</section>

<!-- ================= EXPLORE ================= -->
<section id="explore">

  <!-- 🔥 SINGLE STICKY BLOCK -->
  <div class="sticky-block">

    <div class="explore-header">
      <div class="brand-small">
        <img src="logo.png" class="logo" alt="logo">
        <h2>Recipes</h2>
      </div>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Search recipes..." />
    </div>

    <div class="filters">
      <button class="active" data-cat="all">All</button>
      <button data-cat="Arabic">Arabic</button>
      <button data-cat="Chinese">Chinese</button>
      <button data-cat="Indian">Indian</button>
      <button data-cat="Continental">Continental</button>
      <button data-cat="Mexican">Mexican</button>
      <button data-cat="Nepali">Nepali</button>
      <button data-cat="Thai">Thai</button>
      <button data-cat="Italian">Italian</button>
    </div>

  </div>

  <!-- SCROLL AREA -->
  <div id="recipeList"></div>

</section>

<script src="js/carousel.js"></script>
<script src="js/home.js"></script>

</body>
</html>
