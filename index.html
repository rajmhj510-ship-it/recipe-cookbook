<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
text-align:center;
padding:15px;
}

header img{
height:50px;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
}

.card{
background:#151c25;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:8px;
}

.meta{
font-size:11px;
opacity:0.7;
margin:0 8px 10px;
}
</style>
</head>

<body>

<header>
<img src="./logo.png" alt="Logo">
</header>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const res = await fetch("./data/index.json");
const recipes = await res.json();

const grid = document.getElementById("grid");

grid.innerHTML = recipes.map(r => `
<div class="card" onclick="openRecipe(${r.id})">
<img src="${r.image}" alt="">
<h3>${r.title}</h3>
<div class="meta">${r.category}</div>
</div>
`).join("");

window.openRecipe = function(id){
location.href = `recipe.html?id=${id}`;
};

});
</script>

</body>
</html>
