<script>
document.addEventListener("DOMContentLoaded", () => {

let recipes = [];
let currentList = [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

const grid = document.getElementById("recipeGrid");

/* LOAD DATA */
fetch("./data/arabic-recipes.json")
  .then(res => {
    if (!res.ok) throw new Error("JSON file not found");
    return res.json();
  })
  .then(data => {
    recipes = data;
    currentList = data;
    render(recipes);
  })
  .catch(err => {
    console.log(err);
    grid.innerHTML = "<div class='loading'>❌ Failed to load recipes</div>";
  });

/* RENDER */
function render(list){
  currentList = list;
  grid.innerHTML = "";

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card" onclick="openRecipe(${r.id})">
        <img src="${r.image}">
        <div class="card-body">
          <div class="title">${r.title}</div>
          <div class="meta">${r.time} • ${r.difficulty}</div>
          <span class="badge">${r.category}</span>

          <button class="fav-btn"
            onclick="event.stopPropagation();toggleFav(${r.id})">
            ${favorites.includes(r.id) ? "❤️ Saved" : "🤍 Save"}
          </button>
        </div>
      </div>
    `;
  });
}

/* NAV */
window.openRecipe = function(id){
  window.location.href = "recipe.html?id=" + id;
};

/* FILTER */
window.filterCategory = function(cat){
  if(cat === "All") return render(recipes);
  render(recipes.filter(r => r.category === cat));
};

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(recipes.filter(r => r.title.toLowerCase().includes(val)));
});

/* FAVORITES */
window.toggleFav = function(id){
  if(favorites.includes(id)){
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  render(currentList);
};

window.showFavorites = function(){
  render(recipes.filter(r => favorites.includes(r.id)));
};

});
</script>
