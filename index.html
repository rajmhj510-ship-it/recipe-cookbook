<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletproof Carousel</title>

<style>
body{
margin:0;
background:#fff;
overflow:hidden;
font-family:Arial;
}

.stack{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
position:absolute;
width:220px;
height:300px;
border-radius:18px;
object-fit:cover;
box-shadow:0 15px 40px rgba(0,0,0,0.15);

transition: transform 0.9s cubic-bezier(0.22,1,0.36,1),
            filter 0.9s ease;
will-change: transform;
filter:grayscale(1);
}
</style>
</head>

<body>

<div class="stack" id="stack"></div>

<script src="app.js"></script>

</body>
</html>
