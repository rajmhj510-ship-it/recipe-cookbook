<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digital Cookbook</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  background:#111;
  color:#fff;
}

.paper{
  max-width:1000px;
  margin:auto;
}

h1{
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.card{
  background:#222;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.card:hover{
  background:#333;
}

.badge{
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<input id="searchBox" placeholder="Search recipes..." />

<div id="recipeGrid">Loading...</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const grid = document.getElementById("recipeGrid");

let recipes = [];

/* LOAD JSON */
try {
  const res = await fetch("./data/arabic-recipes.json");
  recipes = await res.json();
  render(recipes);
} catch (err) {
  console.log(err);
  grid.innerHTML = "❌ Failed to load JSON";
}

/* RENDER */
function render(list){
  grid.innerHTML = "";

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card">
        <h3>${r.title}</h3>
        <div class="badge">${r.category}</div>
        <p>${r.time} • ${r.difficulty}</p>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();

  render(
    recipes.filter(r =>
      r.title.toLowerCase().includes(val)
    )
  );
});

});
</script>

</body>
</html>
