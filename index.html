<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
overflow-x:hidden;
}

/* SMOOTH SCROLL */
html{
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
position:relative;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:opacity 0.6s ease;
will-change:transform, opacity;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

/* HERO CONTENT */
.hero-content{
position:relative;
z-index:2;
}

/* ✨ GLOWING LOGO */
.logo{
width:60px;
height:60px;
border-radius:12px;
margin-bottom:10px;

/* neon glow */
box-shadow:
  0 0 10px rgba(255, 204, 112, 0.6),
  0 0 20px rgba(255, 204, 112, 0.4),
  0 0 40px rgba(255, 204, 112, 0.2);

animation: glowPulse 2.5s ease-in-out infinite;
}

/* glow animation */
@keyframes glowPulse {
  0%, 100% {
    transform: scale(1);
    box-shadow:
      0 0 10px rgba(255, 204, 112, 0.5),
      0 0 20px rgba(255, 204, 112, 0.3),
      0 0 40px rgba(255, 204, 112, 0.15);
  }

  50% {
    transform: scale(1.05);
    box-shadow:
      0 0 15px rgba(255, 204, 112, 0.8),
      0 0 30px rgba(255, 204, 112, 0.5),
      0 0 60px rgba(255, 204, 112, 0.25);
  }
}

.hero h1{
margin:0;
font-size:26px;
}

.hero p{
opacity:0.8;
}

/* SCROLL BUTTON */
.scroll-down{
position:absolute;
bottom:25px;
z-index:2;
background:#ffcc70;
color:#000;
padding:10px 16px;
border-radius:25px;
cursor:pointer;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* MAIN APP */
#appSection{
min-height:100vh;
padding:15px;
}

/* APP HEADER */
.app-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
padding:10px 0;
}

.app-logo{
width:45px;
height:45px;
border-radius:10px;
}

.app-text h2{
margin:0;
font-size:18px;
}

.app-text p{
margin:2px 0 0;
font-size:12px;
opacity:0.7;
}

/* SEARCH */
.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
margin-bottom:10px;
}

/* FILTERS */
.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
cursor:pointer;
font-size:12px;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{font-size:14px;margin:6px 0 0;}
.card small{opacity:0.7;font-size:12px;}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="heroSlide">

  <div class="hero-content">
    <img src="./logo.png" class="logo" alt="logo">
    <h1>Cook like a chef </h1>
    <p>Explore global recipes and step-by-step cooking guides</p>
  </div>

  <div class="scroll-down" onclick="goToApp()">
    ⬇ Scroll Down
  </div>

</div>

<!-- MAIN APP -->
<div id="appSection">

  <div class="app-header">
    <img src="./logo.png" class="app-logo">
    <div class="app-text">
      <h2>Recipe Cookbook</h2>
      <p>Explore global recipes</p>
    </div>
  </div>

  <div class="search-box">
    <input id="search" placeholder="Search recipes...">
  </div>

  <div class="filters" id="filters"></div>

  <div class="container" id="list"></div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
