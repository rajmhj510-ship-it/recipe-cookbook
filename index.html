<script>
let recipes = [];
let currentList = [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

/* LOAD DATA */
fetch("./data/arabic-recipes.json")
  .then(res => res.json())
  .then(data => {
    recipes = data;
    currentList = data;
    renderRecipes(recipes);
  })
  .catch(err => {
    console.log("Error loading JSON:", err);
    document.getElementById("recipeGrid").innerHTML =
      "<div class='loading'>Failed to load recipes</div>";
  });

/* RENDER */
function renderRecipes(list){
  currentList = list;

  const grid = document.getElementById("recipeGrid");
  grid.innerHTML = "";

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card" onclick="openRecipe(${r.id})">
        <img src="${r.image}">
        <div class="card-body">
          <div class="title">${r.title}</div>
          <div class="meta">${r.time} • ${r.difficulty}</div>
          <span class="badge">${r.category}</span>

          <button class="fav-btn"
            onclick="event.stopPropagation();toggleFav(${r.id})">
            ${favorites.includes(r.id) ? "❤️ Saved" : "🤍 Save"}
          </button>
        </div>
      </div>
    `;
  });
}

/* NAV */
function openRecipe(id){
  window.location.href = "recipe.html?id=" + id;
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();

  const filtered = recipes.filter(r =>
    r.title.toLowerCase().includes(val)
  );

  renderRecipes(filtered);
});

/* FILTER FIXED */
function filterCategory(cat){
  if(cat === "All"){
    renderRecipes(recipes);
    return;
  }

  const filtered = recipes.filter(r => r.category === cat);
  renderRecipes(filtered);
}

/* FAVORITES */
function toggleFav(id){
  if(favorites.includes(id)){
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderRecipes(currentList);
}

/* FAVORITES VIEW */
function showFavorites(){
  const filtered = recipes.filter(r => favorites.includes(r.id));
  renderRecipes(filtered);
}
</script>
