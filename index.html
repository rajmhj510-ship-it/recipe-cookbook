<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Cookbook</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0b0f14;
  color:#fff;
  padding:20px;
}

.paper{
  max-width:1100px;
  margin:auto;
}

h1{text-align:center;margin-bottom:20px;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:15px;
}

/* filters */
#filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:15px;
}

#filters button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#1b2430;
  color:#fff;
}

#filters button:hover{
  background:#2b6fff;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* card */
.card{
  background:#151c25;
  padding:12px;
  border-radius:14px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-5px);
}

.badge{
  display:inline-block;
  margin-top:6px;
  padding:4px 10px;
  background:#2b6fff;
  border-radius:20px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<input id="searchBox" placeholder="Search recipes..." />

<div id="filters">
  <button onclick="setFilter('All')">🌍 All</button>
  <button onclick="setFilter('Arabic')">🇸🇦 Arabic</button>
</div>

<div id="recipeGrid">Loading...</div>

</div>

<script>
let recipes = [];
let activeFilter = "All";

const grid = document.getElementById("recipeGrid");

/* LOAD JSON */
fetch("data/arabic-recipes.json")
.then(r => r.json())
.then(data => {
  recipes = data;
  render(recipes);
});

/* CLICK FUNCTION */
function openRecipe(id){
  window.location.href = "recipe.html?id=" + id;
}
window.openRecipe = openRecipe;

/* FILTER */
function setFilter(cat){
  activeFilter = cat;
  apply();
}
window.setFilter = setFilter;

/* SEARCH + FILTER ENGINE */
function apply(){
  let list = recipes;

  if(activeFilter !== "All"){
    list = list.filter(r => r.category === activeFilter);
  }

  const search = document.getElementById("searchBox").value.toLowerCase();

  list = list.filter(r =>
    r.title.toLowerCase().includes(search)
  );

  render(list);
}

/* SEARCH EVENT */
document.getElementById("searchBox").addEventListener("input", apply);

/* RENDER */
function render(list){
  grid.innerHTML = "";

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card" onclick="openRecipe(${r.id})">
        <h3>${r.title}</h3>
        <div>${r.time} • ${r.difficulty}</div>
        <div class="badge">${r.category}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
