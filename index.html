<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
overflow-x:hidden;
}

html{
scroll-behavior:smooth;
}

/* HERO */
.hero{
height:100vh;
position:relative;
background:#000;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* STACK */
.bg-stack{
position:absolute;
inset:0;
z-index:0;
}

/* LAYERS */
.bg-layer{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
transition:all 1s ease;
filter:grayscale(1) brightness(0.5);
}

/* SIDE LAYERS (B&W) */
#bg0,#bg1,#bg2,#bg4,#bg5,#bg6{
opacity:0.25;
transform:scale(1.05);
}

/* CENTER IMAGE (COLOR FOCUS) */
#bg3{
filter:grayscale(0) brightness(1);
opacity:1;
transform:scale(1.1);
z-index:5;
box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* HERO CONTENT */
.hero-content{
position:relative;
z-index:2;
text-align:center;
}

/* GLOWING LOGO */
.logo{
width:60px;
height:60px;
border-radius:12px;
margin-bottom:10px;
box-shadow:
0 0 10px rgba(255,204,112,0.6),
0 0 20px rgba(255,204,112,0.4),
0 0 40px rgba(255,204,112,0.2);
animation: glow 2.5s infinite;
}

@keyframes glow{
0%,100%{transform:scale(1);}
50%{transform:scale(1.05);}
}

/* SCROLL BUTTON */
.scroll-down{
position:absolute;
bottom:25px;
z-index:5;
background:#ffcc70;
color:#000;
padding:10px 16px;
border-radius:25px;
cursor:pointer;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* MAIN APP */
#appSection{
min-height:100vh;
padding:15px;
}

.app-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
padding:10px 0;
}

.app-logo{
width:45px;
height:45px;
border-radius:10px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
margin-bottom:10px;
}

.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
cursor:pointer;
font-size:12px;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{font-size:14px;margin:6px 0 0;}
.card small{opacity:0.7;font-size:12px;}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="heroSlide">

  <div class="bg-stack">
    <div class="bg-layer" id="bg0"></div>
    <div class="bg-layer" id="bg1"></div>
    <div class="bg-layer" id="bg2"></div>
    <div class="bg-layer" id="bg3"></div>
    <div class="bg-layer" id="bg4"></div>
    <div class="bg-layer" id="bg5"></div>
    <div class="bg-layer" id="bg6"></div>
  </div>

  <div class="hero-content">
    <img src="./logo.png" class="logo">
    <h1>Cook like a chef</h1>
    <p>Explore global recipes and step-by-step cooking guides</p>
  </div>

  <div class="scroll-down" onclick="goToApp()">
    ⬇ Scroll Down
  </div>

</div>

<!-- MAIN APP -->
<div id="appSection">

  <div class="app-header">
    <img src="./logo.png" class="app-logo">
    <div>
      <h2>Recipe Cookbook</h2>
      <p>Explore global recipes</p>
    </div>
  </div>

  <div class="search-box">
    <input id="search" placeholder="Search recipes...">
  </div>

  <div class="filters" id="filters"></div>

  <div class="container" id="list"></div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
