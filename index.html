<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* HERO */
.hero{
height:100vh;
background-size:cover;
background-position:center;
position:relative;
transition:0.8s ease;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
}

.hero-content{
position:absolute;
bottom:80px;
left:20px;
z-index:2;
}

.logo{
width:50px;
margin-bottom:10px;
}

.hero-content h1{
margin:0;
font-size:26px;
}

.hero-content p{
font-size:14px;
opacity:0.8;
}

.scroll-btn{
margin-top:20px;
font-size:30px;
cursor:pointer;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(8px);}
}

/* MAIN */
.main{
padding:15px;
}

/* SEARCH */
.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1b2430;
color:#fff;
outline:none;
}

/* FILTERS */
.filters{
display:flex;
gap:8px;
overflow-x:auto;
padding:10px 0;
}

.filters button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#1b2430;
color:#fff;
font-size:12px;
cursor:pointer;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

/* CARDS */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
}

.card{
background:#151c25;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:8px;
}

.card small{
margin:0 8px 10px;
display:block;
opacity:0.7;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="heroSlide">

  <div class="hero-content">
    <img src="./logo.png" class="logo">
    <h1>Cook like a chef 👨‍🍳</h1>
    <p>Explore global recipes and step-by-step guides</p>

    <div class="scroll-btn" onclick="scrollDown()">⬇</div>
  </div>

</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="search-box">
    <input type="text" id="search" placeholder="Search recipes...">
  </div>

  <div class="filters" id="filters"></div>

  <div class="container" id="list">Loading...</div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
