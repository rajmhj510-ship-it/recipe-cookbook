<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digital Cookbook</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0b0f14;
  color:#fff;
  padding:20px;
}

.paper{
  max-width:1100px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:#151c25;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-6px);
  background:#1b2430;
}

.card h3{
  margin:0;
  padding:12px;
  font-size:16px;
}

.meta{
  padding:0 12px 12px;
  font-size:12px;
  opacity:0.7;
}

.badge{
  display:inline-block;
  margin:0 12px 12px;
  padding:4px 10px;
  font-size:11px;
  background:#2b6fff;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<input id="searchBox" placeholder="Search recipes..." />

<div id="recipeGrid">Loading...</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const grid = document.getElementById("recipeGrid");

let recipes = [];

/* LOAD JSON */
try {
  const res = await fetch("./data/arabic-recipes.json");
  recipes = await res.json();
  render(recipes);
} catch (err) {
  console.log(err);
  grid.innerHTML = "❌ Failed to load JSON";
}

/* RENDER */
function render(list){
  grid.innerHTML = "";

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card">
        <h3>${r.title}</h3>
        <div class="badge">${r.category}</div>
        <p>${r.time} • ${r.difficulty}</p>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();

  render(
   grid.innerHTML += `
  <div class="card">
    <h3>${r.title}</h3>
    <div class="meta">${r.time} • ${r.difficulty}</div>
    <div class="badge">${r.category}</div>
  </div>
`;

});
</script>

</body>
</html>
