<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0f14;
color:#fff;
}

/* HEADER */
header{
padding:16px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

.top{
display:flex;
align-items:center;
gap:10px;
}

.top img{
width:42px;
height:42px;
border-radius:10px;
}

.top h2{
font-size:18px;
margin:0;
}

/* HERO BANNER */
.hero{
margin:10px 16px;
padding:18px;
border-radius:16px;
background:linear-gradient(135deg,#1b2430,#0f172a);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.hero h3{
margin:0;
font-size:16px;
}

.hero p{
margin:6px 0 0;
opacity:0.7;
font-size:13px;
}

/* SEARCH */
.search-box{
margin-top:12px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#1b2430;
color:#fff;
font-size:14px;
}

/* CATEGORY CHIPS */
.filters{
display:flex;
gap:8px;
overflow-x:auto;
padding:12px 16px;
scroll-snap-type:x mandatory;
}

.filters::-webkit-scrollbar{
display:none;
}

.filters button{
flex:0 0 auto;
padding:8px 14px;
border-radius:20px;
border:none;
background:#1b2430;
color:#fff;
font-size:12px;
cursor:pointer;
transition:0.2s;
scroll-snap-align:start;
}

.filters button:hover{
background:#ffcc70;
color:#000;
}

.filters button.active{
background:#ffcc70;
color:#000;
}

/* GRID */
.container{
padding:16px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:14px;
}

/* CARD */
.card{
background:#151c25;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:10px;
}

.card small{
margin:0 10px 10px;
display:block;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<div class="top">
<img src="./logo.png">
<h2>Recipe Cookbook</h2>
</div>

<div class="hero">
<h3>Cook like a chef 👨‍🍳</h3>
<p>Explore global recipes and step-by-step cooking guides</p>

<div class="search-box">
<input type="text" id="search" placeholder="Search recipes...">
</div>
</div>
</header>

<div class="filters" id="filters"></div>

<div class="container" id="list">Loading...</div>

<script>

let allRecipes = [];
let activeCategory = "All";

document.addEventListener("DOMContentLoaded", async () => {

const res = await fetch("./data/index.json");
allRecipes = await res.json();

renderFilters();
renderRecipes(allRecipes);

document.getElementById("search").addEventListener("input", filterRecipes);
});

function renderFilters(){
const categories = ["All", ...new Set(allRecipes.map(r => r.category))];

document.getElementById("filters").innerHTML =
categories.map(c => `
<button onclick="setCategory(event,'${c}')" class="${c==='All'?'active':''}">
${c}
</button>
`).join("");
}

function setCategory(e, cat){
activeCategory = cat;

document.querySelectorAll(".filters button")
.forEach(b => b.classList.remove("active"));

e.target.classList.add("active");
filterRecipes();
}

function filterRecipes(){
const search = document.getElementById("search").value.toLowerCase();

const filtered = allRecipes.filter(r =>
(activeCategory === "All" || r.category === activeCategory)
&& r.title.toLowerCase().includes(search)
);

renderRecipes(filtered);
}

function renderRecipes(list){
const container = document.getElementById("list");

container.innerHTML = list.map(r => `
<div class="card" onclick="openRecipe('${r.file}')">
<img src="${r.image}">
<h3>${r.title}</h3>
<small>${r.category}</small>
</div>
`).join("");
}

function openRecipe(file){
window.location.href = "recipe.html?file=" + encodeURIComponent(file);
}
</script>

</body>
</html>
