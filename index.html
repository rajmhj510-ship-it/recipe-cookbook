<script>
document.addEventListener("DOMContentLoaded", async () => {

const grid = document.getElementById("recipeGrid");
let recipes = [];
let currentList = [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

/* LOAD DATA */
try {
  const res = await fetch("./data/arabic-recipes.json");
  recipes = await res.json();
  currentList = recipes;
  render(recipes);
} catch (err) {
  console.error(err);
  grid.innerHTML = "<div class='loading'>❌ Failed to load recipes</div>";
}

/* RENDER */
function render(list){
  currentList = list;
  grid.innerHTML = "";

  list.forEach(r => {
    grid.innerHTML += `
      <div class="card" onclick="openRecipe(${r.id})">
        <img src="${r.image}">
        <div class="card-body">
          <div class="title">${r.title}</div>
          <div class="meta">${r.time} • ${r.difficulty}</div>
          <span class="badge">${r.category}</span>

          <button class="fav-btn"
            onclick="event.stopPropagation();toggleFav(${r.id})">
            ${favorites.includes(r.id) ? "❤️ Saved" : "🤍 Save"}
          </button>
        </div>
      </div>
    `;
  });
}

/* GLOBAL FUNCTIONS */
window.openRecipe = (id) => {
  window.location.href = "recipe.html?id=" + id;
};

window.filterCategory = (cat) => {
  if(cat === "All") return render(recipes);
  render(recipes.filter(r => r.category === cat));
};

window.showFavorites = () => {
  render(recipes.filter(r => favorites.includes(r.id)));
};

window.toggleFav = (id) => {
  if(favorites.includes(id)){
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  render(currentList);
};

});
</script>
