<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smooth Stack Carousel</title>

<style>
body{
margin:0;
background:#fff;
overflow:hidden;
font-family:Arial;
}

.stack{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* BASE CARD */
.card{
position:absolute;
width:220px;
height:300px;
border-radius:18px;
object-fit:cover;
box-shadow:0 15px 40px rgba(0,0,0,0.15);

/* IMPORTANT: smooth motion */
transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1), filter 0.85s ease;
will-change: transform;
filter:grayscale(1);
}

/* POSITIONS */
.center{ transform:translateX(0) scale(1.25); z-index:10; filter:grayscale(0); }

.l1{ transform:translateX(-140px) scale(0.95); z-index:9; filter:grayscale(0.6); }
.l2{ transform:translateX(-270px) scale(0.85); z-index:8; filter:grayscale(0.75); }
.l3{ transform:translateX(-400px) scale(0.75); z-index:7; filter:grayscale(0.9); }

.r1{ transform:translateX(140px) scale(0.95); z-index:9; filter:grayscale(0.6); }
.r2{ transform:translateX(270px) scale(0.85); z-index:8; filter:grayscale(0.75); }
.r3{ transform:translateX(400px) scale(0.75); z-index:7; filter:grayscale(0.9); }
</style>
</head>

<body>

<div class="stack" id="stack"></div>

<script src="./js/index.js"></script>

</body>
</html>
