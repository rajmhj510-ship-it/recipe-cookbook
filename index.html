<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipe Cookbook</title>

<link rel="stylesheet" href="css/home.css" />
</head>

<body>

<header class="top-bar">
  <div class="brand">
    <div class="logo"></div>
    <h1 class="brand-name">CookBook</h1>
  </div>

  <input type="text" id="search" placeholder="Search recipes..." />
</header>

<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">
    <button class="nav-arrow left">‹</button>
    <div class="carousel-track"></div>
    <button class="nav-arrow right">›</button>
  </div>

  <div class="recipe-info">
    <h2 class="recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

  <button class="scroll-down">↓ Scroll Down</button>

</section>

<section id="controls" class="hidden">
  <div class="filters">
    <button data-cat="all">All</button>
    <button data-cat="Arabic">Arabic</button>
    <button data-cat="Chinese">Chinese</button>
    <button data-cat="Indian">Indian</button>
    <button data-cat="Continental">Continental</button>
    <button data-cat="Mexican">Mexican</button>
    <button data-cat="Nepali">Nepali</button>
    <button data-cat="Thai">Thai</button>
  </div>

  <div id="recipeList"></div>
</section>

<script src="js/home.js"></script>

</body>
</html>
