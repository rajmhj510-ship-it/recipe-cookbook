<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Carousel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
overflow:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* CAROUSEL WRAPPER */
.carousel{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* CARD BASE */
.card{
width:120px;
height:170px;
border-radius:16px;
object-fit:cover;
transition:all 0.5s ease;
filter:grayscale(1);
opacity:0.4;
transform:scale(0.8);
}

/* LEFT SIDE */
.card.left-3{
opacity:0.25;
transform:scale(0.7);
}

/* LEFT MID */
.card.left-2{
opacity:0.35;
transform:scale(0.8);
}

/* LEFT NEAR */
.card.left-1{
opacity:0.5;
transform:scale(0.9);
}

/* CENTER (FOCUS) */
.card.center{
width:180px;
height:260px;
filter:grayscale(0);
opacity:1;
transform:scale(1.1);
z-index:10;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* RIGHT NEAR */
.card.right-1{
opacity:0.5;
transform:scale(0.9);
}

/* RIGHT MID */
.card.right-2{
opacity:0.35;
transform:scale(0.8);
}

/* RIGHT 3 */
.card.right-3{
opacity:0.25;
transform:scale(0.7);
}
</style>
</head>

<body>

<div class="hero">

  <div class="carousel" id="carousel"></div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
