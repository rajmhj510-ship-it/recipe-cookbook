<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* STACK ROW */
.stack-row{
display:flex;
align-items:center;
justify-content:center;
}

/* CARDS */
.stack-row img{
width:140px;
height:200px;
object-fit:cover;
border-radius:16px;
transition:all 0.4s ease;
filter:grayscale(1);
opacity:0.6;
transform:scale(0.9);
margin-left:-30px;
z-index:1;
}

/* CENTER CARD */
.stack-row img.active{
filter:grayscale(0);
opacity:1;
transform:scale(1.25);
z-index:10;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

/* HEADER TEXT */
.hero-content{
position:absolute;
top:40px;
text-align:center;
}

.hero-content h1{
margin:0;
font-size:22px;
}

.logo{
width:60px;
height:60px;
margin-bottom:8px;
}
</style>
</head>

<body>

<div class="hero">

  <div class="hero-content">
    <img src="./logo.png" class="logo">
    <h1>Cook like a chef</h1>
  </div>

  <div class="stack-row" id="stackRow"></div>

</div>

<script src="./js/index.js"></script>

</body>
</html>
