<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Stack Carousel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
overflow:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* STACK WRAPPER */
.stack{
position:relative;
width:100%;
height:320px;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD BASE */
.card{
position:absolute;
width:140px;
height:200px;
border-radius:16px;
object-fit:cover;
transition:all 0.6s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* CENTER */
.center{
width:200px;
height:280px;
z-index:10;
filter:grayscale(0);
transform:translateX(0) scale(1.1);
opacity:1;
}

/* LEFT 1/3 VISIBLE STACK */
.l1{
transform:translateX(-140px) scale(0.9);
z-index:9;
filter:grayscale(1);
opacity:0.7;
}

.l2{
transform:translateX(-260px) scale(0.8);
z-index:8;
filter:grayscale(1);
opacity:0.5;
}

.l3{
transform:translateX(-380px) scale(0.7);
z-index:7;
filter:grayscale(1);
opacity:0.3;
}

/* RIGHT SIDE */
.r1{
transform:translateX(140px) scale(0.9);
z-index:9;
filter:grayscale(1);
opacity:0.7;
}

.r2{
transform:translateX(260px) scale(0.8);
z-index:8;
filter:grayscale(1);
opacity:0.5;
}

.r3{
transform:translateX(380px) scale(0.7);
z-index:7;
filter:grayscale(1);
opacity:0.3;
}
</style>
</head>

<body>

<div class="hero">
  <div class="stack" id="stack"></div>
</div>

<script src="./js/index.js"></script>

</body>
</html>
