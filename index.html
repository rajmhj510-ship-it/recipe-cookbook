<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipe Cookbook</title>

<link rel="stylesheet" href="css/home.css" />
</head>

<body>

<!-- HEADER -->
<header class="header">

  <!-- LOGO -->
  <div class="logo">
    <img src="assets/images/logo.png" alt="Logo">
    <span>RecipeCook</span>
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search recipes..." />
  </div>

</header>

<!-- CATEGORY FILTER -->
<div class="filters">
  <button class="filter-btn active" data-category="All">All</button>
  <button class="filter-btn" data-category="Arabic">Arabic</button>
  <button class="filter-btn" data-category="Chinese">Chinese</button>
  <button class="filter-btn" data-category="Indian">Indian</button>
  <button class="filter-btn" data-category="Italian">Italian</button>
  <button class="filter-btn" data-category="Mexican">Mexican</button>
  <button class="filter-btn" data-category="Nepali">Nepali</button>
  <button class="filter-btn" data-category="Thai">Thai</button>
</div>

<!-- HERO -->
<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">
    <button class="nav-arrow left">‹</button>
    <div class="carousel-track"></div>
    <button class="nav-arrow right">›</button>
  </div>

  <div class="recipe-info">
    <h2 class="recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

</section>

<script src="js/home.js"></script>

</body>
</html>
