<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Cookbook</title>
  <link rel="stylesheet" href="css/home.css" />
</head>

<body>

<!-- HERO -->
<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">
    <button class="nav-arrow left">‹</button>
    <div class="carousel-track"></div>
    <button class="nav-arrow right">›</button>
  </div>

  <div class="recipe-info">
    <h2 class="recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

  <button class="scroll-down">↓ Scroll Down</button>

</section>

<!-- SEARCH SECTION (LOGO INSIDE) -->
<section id="search-section">

  <div class="logo-wrapper">
    <img src="logo.png" alt="Recipe Logo" class="site-logo">
  </div>

  <h2>Search Recipes</h2>

  <input type="text" placeholder="Search recipes..." />

  <div class="search-results"></div>

</section>

<script src="js/home.js"></script>

</body>
</html>
