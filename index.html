<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Cookbook</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0b0f14;
color:#fff;
padding:20px;
}

.paper{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* FILTERS */
#filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

#filters button{
padding:8px 12px;
border:none;
border-radius:20px;
cursor:pointer;
background:#1b2430;
color:#fff;
font-size:12px;
transition:0.2s;
}

#filters button:hover{
background:#2b6fff;
}

/* SEARCH */
#searchBox{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
margin-bottom:20px;
}

/* GRID */
#recipeGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

/* CARD */
.card{
background:#151c25;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-5px);
background:#1b2430;
}

/* IMAGE */
.card img{
width:100%;
height:160px;
object-fit:cover;
display:block;
}

/* TEXT */
.card h3{
margin:0;
padding:10px 12px 0;
font-size:16px;
}

.meta{
padding:0 12px;
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.badge{
display:inline-block;
margin:10px 12px 12px;
padding:4px 10px;
font-size:11px;
background:#2b6fff;
border-radius:20px;
}

.loading{
text-align:center;
padding:30px;
grid-column:1/-1;
}

.error{
text-align:center;
padding:30px;
color:#ff6b6b;
grid-column:1/-1;
}

</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<div id="filters">
<button onclick="setFilter('All')">🌍 All</button>
<button onclick="setFilter('Arabic')">🇸🇦 Arabic</button>
<button onclick="setFilter('Chinese')">🇨🇳 Chinese</button>
<button onclick="setFilter('Continental')">🍽 Continental</button>
<button onclick="setFilter('Indian')">🇮🇳 Indian</button>
<button onclick="setFilter('Mexican')">🇲🇽 Mexican</button>
<button onclick="setFilter('Thai')">🇹🇭 Thai</button>
<button onclick="setFilter('Italian')">🇮🇹 Italian</button>
<button onclick="setFilter('Nepali')">🇳🇵 Nepali</button>
</div>

<input id="searchBox" placeholder="Search recipes..." />

<div id="recipeGrid">
<div class="loading">Loading recipes...</div>
</div>

</div>

<script>

let recipes = [];
let activeFilter = "All";

const grid = document.getElementById("recipeGrid");

/* OPEN RECIPE */
window.openRecipe = function(id){
window.location.href = "recipe.html?id=" + id;
};

/* FILTER */
window.setFilter = function(category){
activeFilter = category;

let filtered = recipes;

if(category !== "All"){
filtered = recipes.filter(r => r.category === category);
}

render(filtered);
};

/* RENDER */
function render(list){

grid.innerHTML = "";

if(list.length === 0){
grid.innerHTML = "<div class='loading'>No recipes found</div>";
return;
}

list.forEach(recipe => {

grid.innerHTML += `
<div class="card" onclick="openRecipe(${recipe.id})">

<img src="${recipe.image}" alt="${recipe.title}">

<h3>${recipe.title}</h3>

<div class="meta">
⏱ ${recipe.time} • 🔥 ${recipe.difficulty}
</div>

<div class="badge">
${recipe.category}
</div>

</div>
`;

});
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", function(e){

const value = e.target.value.toLowerCase();

let filtered = recipes;

if(activeFilter !== "All"){
filtered = filtered.filter(r => r.category === activeFilter);
}

filtered = filtered.filter(r =>
r.title.toLowerCase().includes(value)
);

render(filtered);

});

/* LOAD DATA */
document.addEventListener("DOMContentLoaded", async function(){

try{

const res = await fetch("./data/arabic-recipes.json");

if(!res.ok){
throw new Error("JSON not found");
}

recipes = await res.json();

render(recipes);

}catch(err){

console.error(err);

grid.innerHTML = `
<div class="error">
❌ Failed to load recipes
</div>
`;

}

});

</script>

</body>
</html>
