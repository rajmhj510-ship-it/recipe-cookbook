<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Cookbook</title>

  <link rel="stylesheet" href="css/home.css" />
</head>

<body>

<!-- HERO (CAROUSEL ONLY) -->
<section id="hero">

  <h1 class="about-title">COOK LIKE A CHEF</h1>

  <div class="carousel-container">
    <button class="nav-arrow left">‹</button>
    <div class="carousel-track"></div>
    <button class="nav-arrow right">›</button>
  </div>

  <div class="recipe-info">
    <h2 class="recipe-title"></h2>
    <p class="recipe-meta"></p>
  </div>

  <button class="scroll-down">↓ Scroll Down</button>

</section>

<!-- SEARCH / MAIN APP SECTION -->
<section id="appSection">

  <div class="app-header">
    <img src="./logo.png" class="app-logo">
    <div class="app-text">
      <h2>Recipe Cookbook</h2>
      <p>Explore global recipes</p>
    </div>
  </div>

  <div class="search-box">
    <input id="search" placeholder="Search recipes...">
  </div>

  <div class="filters" id="filters"></div>

  <div class="container" id="list"></div>

</section>

<script src="./js/home.js"></script>

</body>
</html>
