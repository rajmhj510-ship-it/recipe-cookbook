<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Cookbook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
position:relative;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:0.6s ease-in-out;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.hero-content{
position:relative;
z-index:2;
}

.logo{
width:60px;
height:60px;
border-radius:12px;
margin-bottom:10px;
}

.hero h1{
font-size:26px;
margin:0;
}

.hero p{
opacity:0.8;
margin-top:5px;
}

/* SCROLL BUTTON */
.scroll-down{
position:absolute;
bottom:25px;
z-index:2;
background:#ffcc70;
color:#000;
padding:10px 16px;
border-radius:25px;
cursor:pointer;
font-size:14px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* MAIN SECTION */
#main{
display:none;
padding:15px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:#151c25;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="heroSlide">

  <div class="hero-content">
    <img src="./logo.png" class="logo">
    <h1>Cook like a chef 👨‍🍳</h1>
    <p>Explore global recipes and step-by-step cooking guides</p>
  </div>

  <div class="scroll-down" onclick="scrollDown()">
    ⬇ Scroll Down
  </div>

</div>

<!-- MAIN -->
<div id="main">
  <h2>Recipes</h2>
  <div class="container" id="list"></div>
</div>

<script src="./js/index.js"></script>

</body>
</html>
