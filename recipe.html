<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Page</title>

<style>
body {
	font-family: Arial;
	margin: 0;
	background: #f5f5f5;
}

#hero {
	height: 300px;
	background-size: cover;
	background-position: center;
	display: flex;
	align-items: center;
	justify-content: center;
	color: white;
	font-size: 2rem;
	font-weight: bold;
	text-shadow: 0 2px 10px black;
}

#content {
	padding: 20px;
}

.step {
	padding: 10px;
	background: white;
	margin: 10px 0;
	border-radius: 10px;
	cursor: pointer;
}

.step.done {
	text-decoration: line-through;
	opacity: 0.6;
}
</style>
</head>

<body>

<div id="hero"></div>

<img id="recipeImage" style="width:100%; max-height:400px; object-fit:cover;">

<div id="content"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

	const file = new URLSearchParams(location.search).get("file");

	const content = document.getElementById("content");
	const hero = document.getElementById("hero");

	if (!file) {
		content.innerHTML = "Recipe not found ❌";
		return;
	}

	try {
		const res = await fetch(file);
		if (!res.ok) throw new Error("File not found");

		const recipe = await res.json();

		hero.style.backgroundImage = `url('${recipe.image}')`;
		document.getElementById("recipeImage").src = recipe.image;

		content.innerHTML = recipe.content || "<p>No content available</p>";

	} catch (err) {
		console.error(err);
		content.innerHTML = "Failed to load recipe ❌";
	}
});

function toggleStep(el) {
	el.classList.toggle("done");
}
</script>

</body>
</html>
