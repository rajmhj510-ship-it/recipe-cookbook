<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

.hero{
height:260px;
background-size:cover;
background-position:center;
position:relative;
}

.back{
position:absolute;
top:15px;
left:15px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
margin-top:-40px;
}

.card{
background:#151c25;
border-radius:16px;
padding:16px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin-right:6px;
}

h3{
margin-top:18px;
}

.group{
margin-bottom:12px;
}

.group h4{
margin-bottom:6px;
opacity:0.8;
}

ul{
padding-left:18px;
}

.instructions .step{
background:#1b2430;
padding:10px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
display:flex;
gap:8px;
align-items:flex-start;
}

.step.done{
background:#223a2a;
opacity:0.8;
}

.tick{
display:none;
color:#00c853;
}

.step.done .tick{
display:inline;
}
</style>
</head>

<body>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">← Back</button>
</div>

<div class="container">
<div class="card" id="content">
Loading...
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const id = new URLSearchParams(location.search).get("id");

const indexRes = await fetch("./data/index.json");
const index = await indexRes.json();

const meta = index.find(r => r.id == id);

if(!meta){
document.getElementById("content").innerHTML = "Recipe not found";
return;
}

const res = await fetch(meta.file);
const recipe = await res.json();

document.getElementById("hero").style.backgroundImage =
`url('${meta.image}')`;

document.getElementById("content").innerHTML = `
<h1>${recipe.title}</h1>

<div class="meta">
<span>${recipe.time || ""}</span>
<span>${recipe.difficulty || ""}</span>
<span>${recipe.category || ""}</span>
</div>

<h3>Ingredients</h3>
${recipe.ingredients.map(g => `
<div class="group">
<h4>${g.group}</h4>
<ul>
${g.items.map(i => `<li>${i}</li>`).join("")}
</ul>
</div>
`).join("")}

<h3>Instructions</h3>
<div class="instructions">
${recipe.instructions.map(g => `
<div class="group">
<h4>${g.group}</h4>
${g.steps.map(s => `
<div class="step" onclick="this.classList.toggle('done')">
<span class="tick">✔</span>
<span>${s}</span>
</div>
`).join("")}
</div>
`).join("")}
</div>
`;
});
</script>

</body>
</html>
