<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body {
	font-family: Arial;
	margin: 0;
	background: #f5f5f5;
}

#hero {
	height: 300px;
	background-size: cover;
	background-position: center;
	display: flex;
	align-items: center;
	justify-content: center;
	color: white;
	font-size: 2rem;
	font-weight: bold;
	text-shadow: 0 2px 10px black;
}

.container {
	padding: 20px;
	max-width: 900px;
	margin: auto;
}

.section {
	background: white;
	padding: 15px;
	margin-bottom: 15px;
	border-radius: 10px;
}

.section h2 {
	margin-bottom: 10px;
	color: #082a7b;
}

ul {
	padding-left: 20px;
}

li {
	margin-bottom: 6px;
}

.step {
	padding: 8px;
	background: #f2f2f2;
	margin: 6px 0;
	border-radius: 8px;
	cursor: pointer;
}

.step.done {
	text-decoration: line-through;
	opacity: 0.6;
}
</style>
</head>

<body>

<div id="hero"></div>

<div class="container" id="content"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

	const file = new URLSearchParams(location.search).get("file");

	const content = document.getElementById("content");
	const hero = document.getElementById("hero");

	if (!file) {
		content.innerHTML = "<h2>Recipe not found ❌</h2>";
		return;
	}

	try {
		const res = await fetch(file);
		if (!res.ok) throw new Error("File not found");

		const recipe = await res.json();

		// HERO IMAGE
		hero.style.backgroundImage = `url('${recipe.image}')`;

		// INGREDIENTS
		let ingredientsHTML = "";
		recipe.ingredients.forEach(group => {
			ingredientsHTML += `
				<div class="section">
					<h2>${group.title}</h2>
					<ul>
						${group.items.map(i => `<li>${i}</li>`).join("")}
					</ul>
				</div>
			`;
		});

		// INSTRUCTIONS
		let instructionHTML = "";
		recipe.instruction.forEach(section => {
			instructionHTML += `
				<div class="section">
					<h2>${section.title}</h2>
					${section.steps.map(step =>
						`<div class="step" onclick="toggleStep(this)">${step}</div>`
					).join("")}
				</div>
			`;
		});

		// CHEF TIPS
		let tipsHTML = `
			<div class="section">
				<h2>Chef Tips</h2>
				<ul>
					${recipe.chefTips.map(tip => `<li>${tip}</li>`).join("")}
				</ul>
			</div>
		`;

		// RENDER EVERYTHING
		content.innerHTML =
			ingredientsHTML + instructionHTML + tipsHTML;

	} catch (err) {
		console.error(err);
		content.innerHTML = "<h2>Failed to load recipe ❌</h2>";
	}
});

// STEP TOGGLE
function toggleStep(el) {
	el.classList.toggle("done");
}
</script>

</body>
</html>
