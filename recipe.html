<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f14;
color:#fff;
}

/* HERO */
.hero{
height:300px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.35));
}

/* ✨ LOGO + BACK SYMBOL GROUP */
.logo-back{
position:absolute;
top:12px;
left:12px;
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
z-index:5;
}

/* LOGO */
.logo-top{
width:42px;
height:42px;
border-radius:10px;
padding:4px;
object-fit:cover;
background:rgba(0,0,0,0.4);

/* glow */
box-shadow:
  0 0 10px rgba(255, 204, 112, 0.5),
  0 0 20px rgba(255, 204, 112, 0.3),
  0 0 40px rgba(255, 204, 112, 0.15);

animation: logoGlow 2.5s ease-in-out infinite;
}

/* BACK SYMBOL */
.back-symbol{
margin-top:4px;
font-size:18px;
color:#ffcc70;
text-shadow:0 0 8px rgba(255,204,112,0.6);
}

/* GLOW ANIMATION */
@keyframes logoGlow {
  0%, 100% {
    transform: scale(1);
    box-shadow:
      0 0 10px rgba(255, 204, 112, 0.4),
      0 0 20px rgba(255, 204, 112, 0.25),
      0 0 40px rgba(255, 204, 112, 0.1);
  }

  50% {
    transform: scale(1.06);
    box-shadow:
      0 0 15px rgba(255, 204, 112, 0.7),
      0 0 30px rgba(255, 204, 112, 0.45),
      0 0 60px rgba(255, 204, 112, 0.2);
  }
}

/* FLOAT IMAGE */
.hero-image-box{
position:absolute;
bottom:14px;
right:14px;
width:110px;
height:80px;
border-radius:10px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.9);
cursor:pointer;
z-index:5;
}

.hero-image-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* MAIN CARD */
.container{
padding:15px;
}

.card{
background:#151c25;
border-radius:18px;
padding:18px;
margin-top:-20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* TITLE */
h1{
margin:0 0 10px;
font-size:20px;
}

/* META */
.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

/* SECTION */
.section-title{
margin-top:18px;
margin-bottom:10px;
font-size:12px;
letter-spacing:1px;
text-transform:uppercase;
color:#ffcc70;
}

.section-title.sub{
color:#7dd3fc;
font-size:14px;
font-weight:600;
margin-top:12px;
margin-bottom:6px;
text-transform:none;
}

/* INGREDIENTS */
.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1b2430;
border-radius:10px;
margin-bottom:6px;
font-size:13px;
color:#cbd5e1;
cursor:pointer;
}

/* STEPS */
.step{
background:#1b2430;
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
color:#cbd5e1;
}

.step:hover{
background:#243041;
transform:scale(1.01);
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:80%;
border-radius:12px;
}
</style>
</head>

<body>

<div class="hero" id="hero">

<!-- 🔥 LOGO + BACK SYMBOL -->
<div class="logo-back" onclick="history.back()">
  <img src="./logo.png" class="logo-top" alt="logo">
  <div class="back-symbol">⬅</div>
</div>

<div class="hero-image-box" onclick="openImage()">
<img id="recipeImage">
</div>

</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<div class="modal" id="imgModal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>
// (your existing JS stays SAME — no change needed)
</script>

</body>
</html>
