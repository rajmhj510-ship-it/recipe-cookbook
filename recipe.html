<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0b0f14;
color:#fff;
transition:0.3s;
}

/* HERO */
.hero{
height:280px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.2));
}

.back{
position:absolute;
top:15px;
left:15px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:2;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
margin-top:-40px;
}

/* CARD */
.card{
background:#151c25;
border-radius:16px;
padding:16px;
border:1px solid rgba(255,255,255,0.05);
}

/* TITLE */
h1{
font-size:22px;
margin-bottom:10px;
}

/* META */
.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:12px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* INGREDIENTS */
.ingredients{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.ingredients span{
background:#222c3a;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

/* INSTRUCTIONS */
.instructions .step-item{
background:#1b2430;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border-left:3px solid #2b6fff;
cursor:pointer;
display:flex;
gap:10px;
align-items:flex-start;
font-size:13px;
transition:0.2s;
}

.instructions .step-item:hover{
background:#222c3a;
}

.tick{
display:none;
color:#00c853;
font-size:16px;
font-weight:bold;
min-width:20px;
}

.step-item.done{
opacity:0.7;
border-left:3px solid #00c853;
}

.step-item.done .tick{
display:inline-block;
}

/* BLOCK */
.block{
background:#1b2430;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

/* BUTTONS */
button.save,
button.cook-mode-btn{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
font-size:14px;
}

button.save{
background:#2b6fff;
}

button.cook-mode-btn{
background:#00c853;
}

/* LOADING */
.loading{
text-align:center;
padding:30px;
opacity:0.7;
}

/* =========================
   COOKING MODE
========================= */

body.cooking{
background:#000;
}

body.cooking .hero{
display:none;
}

body.cooking .container{
margin-top:0;
max-width:100%;
padding:10px;
}

body.cooking .card{
background:#000;
border:none;
box-shadow:none;
}

body.cooking .meta,
body.cooking .ingredients,
body.cooking .block,
body.cooking .save{
display:none;
}

body.cooking h3{
color:#00c853;
}

body.cooking .step-item{
font-size:16px;
padding:16px;
}

</style>
</head>

<body>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">← Back</button>
</div>

<div class="container">
<div class="card" id="content">
<div class="loading">Loading recipe...</div>
</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const id = Number(new URLSearchParams(location.search).get("id"));
const content = document.getElementById("content");
const hero = document.getElementById("hero");

try {

const [arabicRes, chineseRes] = await Promise.all([
fetch("./data/arabic-recipes.json"),
fetch("./data/chinese-recipes.json")
]);

const arabic = await arabicRes.json();
const chinese = await chineseRes.json();

const allRecipes = [...arabic, ...chinese];

const recipe = allRecipes.find(r => r.id === id);

if(!recipe){
content.innerHTML = '<div class="loading">Recipe not found</div>';
return;
}

hero.style.backgroundImage = `url('${recipe.image}')`;

content.innerHTML = `

<h1>${recipe.title}</h1>

<div class="meta">
<span>⏱ ${recipe.time}</span>
<span>🔥 ${recipe.difficulty}</span>
<span>🍽 ${recipe.category}</span>
</div>

<button class="save">❤️ Save Recipe</button>

<button class="cook-mode-btn" onclick="toggleCookingMode()">
🍳 Cooking Mode
</button>

<h3>Ingredients</h3>
<div class="ingredients">
${(recipe.ingredients || []).map(i => `<span>${i}</span>`).join("")}
</div>

<h3>Instructions</h3>
<div class="instructions">
${(recipe.steps || []).map(s => `
  <div class="step-item" onclick="markStep(this)">
    <span class="tick">✔</span>
    <span>${s}</span>
  </div>
`).join("")}
</div>

${recipe.servingSuggestions ? `
<h3>Serving Suggestions</h3>
${recipe.servingSuggestions.map(s => `
<div class="block">${s}</div>
`).join("")}
` : ""}

${recipe.chefTips ? `
<h3>Chef Tips</h3>
${recipe.chefTips.map(t => `
<div class="block">${t}</div>
`).join("")}
` : ""}

`;

} catch (err) {
console.error(err);
content.innerHTML = '<div class="loading">Failed to load recipe ❌</div>';
}

});

/* STEP COMPLETE */
window.markStep = function(el){
el.classList.add("done");
};

/* COOKING MODE */
window.toggleCookingMode = function(){
document.body.classList.toggle("cooking");

if(document.body.classList.contains("cooking")){
document.documentElement.requestFullscreen?.();
}else{
document.exitFullscreen?.();
}
};

</script>

</body>
</html>
