<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b0f14;
  color:#fff;
}

.hero{
  height:300px;
  background-size:cover;
  background-position:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.35));
}

.back{
  position:absolute;
  top:12px;
  left:12px;
  z-index:5;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  cursor:pointer;
}

.logo-top{
  position:absolute;
  top:12px;
  left:80px;
  width:34px;
  height:34px;
  border-radius:8px;
  object-fit:cover;
  z-index:5;
}

.hero-image-box{
  position:absolute;
  bottom:14px;
  right:14px;
  width:110px;
  height:80px;
  border-radius:10px;
  overflow:hidden;
  border:2px solid white;
  cursor:pointer;
  z-index:5;
}

.hero-image-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.container{ padding:15px; }

.card{
  background:#151c25;
  border-radius:18px;
  padding:18px;
  margin-top:-20px;
}

.meta span{
  background:#222c3a;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  margin-right:5px;
}

.step{
  background:#1b2430;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.step.done{
  opacity:0.6;
  border-left:3px solid #00c853;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:90%;
  max-height:80%;
}
</style>
</head>

<body>

<div class="hero" id="hero">

<button class="back" onclick="history.back()">← Back</button>

<img src="./logo.png" class="logo-top">

<div class="hero-image-box" onclick="openImage()">
<img id="recipeImage">
</div>

</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<div class="modal" id="imgModal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const id = new URLSearchParams(location.search).get("id");

const content = document.getElementById("content");
const hero = document.getElementById("hero");

if(!id){
  content.innerHTML = "Recipe not found";
  return;
}

try{

const res = await fetch(`data/recipes/${id}.json`);
if(!res.ok) throw new Error("Recipe not found");

const recipe = await res.json();

/* HERO */
hero.style.backgroundImage = `url('${recipe.image}')`;
document.getElementById("recipeImage").src = recipe.image;

/* INGREDIENTS */
function renderIngredient(item){
if(typeof item === "string"){
return `<label><span>${item}</span><input type="checkbox"></label>`;
}

if(item?.title){
return `
<div>
<h4>${item.title}</h4>
${(item.items || []).map(renderIngredient).join("")}
</div>
`;
}
return "";
}

/* STEPS */
function renderSteps(){
return (recipe.instruction || []).map(sec => `
<div>
<h4>${sec.title || ""}</h4>
${sec.steps.map(s => `<div class="step" onclick="toggleStep(this)">${s}</div>`).join("")}
</div>
`).join("");
}

content.innerHTML = `
<h1>${recipe.title}</h1>

<div class="meta">
<span>⏱ ${recipe.time}</span>
<span>🔥 ${recipe.difficulty}</span>
<span>🍽 ${recipe.category}</span>
</div>

<h3>Ingredients</h3>
${recipe.ingredients.map(renderIngredient).join("")}

<h3>Instructions</h3>
${renderSteps()}

<h3>Chef Tips</h3>
<ul>
${recipe.chefTips.map(t => `<li>${t}</li>`).join("")}
</ul>
`;

}catch(err){
content.innerHTML = "Failed to load recipe ❌";
console.error(err);
}

});

function toggleStep(el){
el.classList.toggle("done");
}

function openImage(){
const img = document.getElementById("recipeImage").src;
document.getElementById("modalImg").src = img;
document.getElementById("imgModal").style.display = "flex";
}

function closeImage(){
document.getElementById("imgModal").style.display = "none";
}
</script>

</body>
</html>
