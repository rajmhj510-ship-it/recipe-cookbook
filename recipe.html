<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#0b1220;color:#fff;margin:0;}

.hero{height:300px;background-size:cover;position:relative;}
.back{position:absolute;top:10px;left:10px;padding:6px 10px;border:none;background:#000;color:#fff;border-radius:10px;}

.container{max-width:800px;margin:auto;padding:15px;}

.card{background:rgba(255,255,255,0.08);padding:15px;border-radius:15px;}

.meta span{margin-right:8px;background:#333;padding:4px 8px;border-radius:10px;font-size:12px;}

.step, .block{background:#222;padding:10px;margin-top:8px;border-radius:10px;}

</style>
</head>

<body>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">Back</button>
</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<script>

const id=new URLSearchParams(location.search).get("id");

fetch("data/arabic-recipes.json")
.then(r=>r.json())
.then(data=>{

const recipe=data.find(x=>x.id==id);

if(!recipe){
document.getElementById("content").innerHTML="Not found";
return;
}

document.getElementById("hero").style.backgroundImage=`url(${recipe.image})`;

document.getElementById("content").innerHTML=`
<h2>${recipe.title}</h2>

<div class="meta">
<span>${recipe.time}</span>
<span>${recipe.difficulty}</span>
<span>${recipe.category}</span>
</div>

<h3>Ingredients</h3>
${recipe.ingredients.map(i=>`<div class="block">${i}</div>`).join("")}

<h3>Steps</h3>
${recipe.steps.map((s,i)=>`<div class="step">${i+1}. ${s}</div>`).join("")}

${recipe.servingSuggestions?`
<h3>Serving</h3>
${recipe.servingSuggestions.map(s=>`<div class="block">${s}</div>`).join("")}
`:""}

${recipe.chefTips?`
<h3>Tips</h3>
${recipe.chefTips.map(t=>`<div class="block">${t}</div>`).join("")}
`:""}
`;

});

</script>

</body>
</html>
