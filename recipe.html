<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0f14;
color:#fff;
}

/* HERO */
.hero{
height:280px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.3));
}

/* BACK BUTTON */
.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:3;
}

/* FLOAT IMAGE */
.hero-image-box{
position:absolute;
bottom:12px;
right:12px;
width:110px;
height:80px;
border-radius:10px;
overflow:hidden;
border:2px solid #fff;
z-index:3;
}

.hero-image-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* MAIN CARD */
.container{
padding:15px;
}

.card{
background:#151c25;
border-radius:18px;
padding:18px;
margin-top:-20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* TITLE */
h1{
margin:0 0 10px;
font-size:20px;
}

/* META */
.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

/* SECTION TITLE */
.section-title{
margin-top:18px;
margin-bottom:10px;
font-size:12px;
letter-spacing:1px;
text-transform:uppercase;
color:#ffcc70;
}

/* INGREDIENTS */
.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1b2430;
border-radius:10px;
margin-bottom:6px;
font-size:13px;
color:#cbd5e1;
transition:0.2s;
}

.ingredients label:hover{
background:#243041;
}

/* INSTRUCTIONS */
.instructions .step{
background:#1b2430;
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
color:#cbd5e1;
}

.instructions .step:hover{
background:#243041;
transform:scale(1.01);
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

/* CHEF TIPS */
.chef-tips{
list-style:disc;
padding-left:20px;
margin-top:8px;
}

.chef-tips li{
margin-bottom:6px;
font-size:13px;
color:#b6c2d1;
line-height:1.5;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:80%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="hero" id="hero">

<button class="back" onclick="history.back()">← Back</button>

<div class="hero-image-box" onclick="openImage()">
<img id="recipeImage">
</div>

</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<div id="imgModal" class="modal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const file = new URLSearchParams(location.search).get("file");
const content = document.getElementById("content");
const hero = document.getElementById("hero");

if (!file) {
content.innerHTML = "Recipe not found";
return;
}

try {

const res = await fetch(file);
const recipe = await res.json();

/* HERO */
if (recipe.image) {
hero.style.backgroundImage = `url('${recipe.image}')`;
document.getElementById("recipeImage").src = recipe.image;
}

/* INGREDIENTS */
function renderIngredient(item){

if(typeof item === "string"){
return `
<label>
<span>${item}</span>
<input type="checkbox">
</label>
`;
}

if(item.title){
return `
<div>
<div class="section-title">${item.title}</div>
${item.items.map(renderIngredient).join("")}
</div>
`;
}

return "";
}

/* STEPS */
function renderSteps(){
return recipe.instruction.map(sec => `
<div>
<div class="section-title">${sec.title}</div>
${sec.steps.map(s => `<div class="step" onclick="toggleStep(this)">${s}</div>`).join("")}
</div>
`).join("");
}

/* UI */
content.innerHTML = `
<h1>${recipe.title}</h1>

<div class="meta">
<span>⏱ ${recipe.time || ""}</span>
<span>🔥 ${recipe.difficulty || ""}</span>
<span>🍽 ${recipe.category || ""}</span>
</div>

<h3 class="section-title">Ingredients</h3>
<div class="ingredients">
${recipe.ingredients.map(renderIngredient).join("")}
</div>

<h3 class="section-title">Instructions</h3>
<div class="instructions">
${renderSteps()}
</div>

<h3 class="section-title">Chef Tips</h3>
<ul class="chef-tips">
${recipe.chefTips.map(t => `<li>${t}</li>`).join("")}
</ul>
`;

} catch(err){
content.innerHTML = "Failed to load recipe";
}

});

/* STEP TOGGLE */
function toggleStep(el){
el.classList.toggle("done");
}

/* IMAGE MODAL */
function openImage(){
const img = document.getElementById("recipeImage").src;
document.getElementById("modalImg").src = img;
document.getElementById("imgModal").style.display = "flex";
}

function closeImage(){
document.getElementById("imgModal").style.display = "none";
}
</script>

</body>
</html>
