<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Cookbook</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0b0f14;
color:#fff;
padding:20px;
}

.paper{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* FILTERS */
#filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

#filters button{
padding:8px 12px;
border:none;
border-radius:20px;
cursor:pointer;
background:#1b2430;
color:#fff;
font-size:12px;
transition:0.2s;
}

#filters button:hover{
background:#2b6fff;
transform:scale(1.05);
}

/* SEARCH */
#searchBox{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
margin-bottom:20px;
}

/* GRID */
#recipeGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

/* CARD */
.card{
background:#151c25;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
position:relative;
}

.card:hover{
transform:translateY(-6px);
background:#1b2430;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
display:block;
}

.card h3{
margin:0;
padding:10px 12px 0;
font-size:16px;
}

.meta{
padding:0 12px;
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.badge{
display:inline-block;
margin:10px 12px 12px;
padding:4px 10px;
font-size:11px;
background:#2b6fff;
border-radius:20px;
}

/* ❤️ */
.fav-btn{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
border:none;
color:#fff;
font-size:16px;
padding:6px 8px;
border-radius:50%;
cursor:pointer;
}

/* 📌 RECENT */
.recent{
margin:20px 0;
padding:10px;
background:#151c25;
border-radius:12px;
font-size:12px;
opacity:0.8;
}

/* SKELETON */
.skeleton{
background:linear-gradient(90deg,#1b2430,#222c3a,#1b2430);
background-size:200% 100%;
animation:shimmer 1.5s infinite;
height:220px;
border-radius:14px;
}

@keyframes shimmer{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

.loading-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

</style>
</head>

<body>

<div class="paper">

<h1>🍲 Digital Cookbook</h1>

<div id="filters">
<button onclick="setFilter('All')">🌍 All</button>
<button onclick="setFilter('Arabic')">🇸🇦 Arabic</button>
<button onclick="setFilter('Chinese')">🇨🇳 Chinese</button>
<button onclick="setFilter('Continental')">🍽 Continental</button>
<button onclick="setFilter('Indian')">🇮🇳 Indian</button>
<button onclick="setFilter('Mexican')">🇲🇽 Mexican</button>
<button onclick="setFilter('Thai')">🇹🇭 Thai</button>
<button onclick="setFilter('Italian')">🇮🇹 Italian</button>
<button onclick="setFilter('Nepali')">🇳🇵 Nepali</button>
</div>

<input id="searchBox" placeholder="Search recipes..." />

<!-- 📌 RECENTLY VIEWED -->
<div class="recent" id="recentBox">Recently viewed: None</div>

<div id="recipeGrid"></div>

</div>

<script>

let recipes = [];
let activeFilter = "All";
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let recent = JSON.parse(localStorage.getItem("recent")) || [];

const grid = document.getElementById("recipeGrid");
const recentBox = document.getElementById("recentBox");

/* OPEN RECIPE + SAVE RECENT */
window.openRecipe = function(id){

recent = [id, ...recent.filter(r => r !== id)].slice(0,5);
localStorage.setItem("recent", JSON.stringify(recent));

window.location.href = "recipe.html?id=" + id;
};

/* FILTER */
window.setFilter = function(category){
activeFilter = category;
render(getFiltered());
};

/* FILTER LOGIC */
function getFiltered(){

let list = recipes;

if(activeFilter !== "All"){
list = list.filter(r => r.category === activeFilter);
}

return list;
}

/* RENDER */
function render(list){

grid.innerHTML = "";

if(list.length === 0){
grid.innerHTML = "<div>No recipes found</div>";
return;
}

list.forEach(recipe => {

const isFav = favorites.includes(recipe.id);

grid.innerHTML += `
<div class="card" onclick="openRecipe(${recipe.id})">

<img src="${recipe.image}" alt="${recipe.title}">

<button class="fav-btn" onclick="event.stopPropagation();toggleFav(${recipe.id})">
${isFav ? "❤️" : "🤍"}
</button>

<h3>${recipe.title}</h3>

<div class="meta">
⏱ ${recipe.time} • 🔥 ${recipe.difficulty}
</div>

<div class="badge">${recipe.category}</div>

</div>
`;

});

}

/* FAVORITES */
window.toggleFav = function(id){

if(favorites.includes(id)){
favorites = favorites.filter(f => f !== id);
}else{
favorites.push(id);
}

localStorage.setItem("favorites", JSON.stringify(favorites));
render(getFiltered());

};

/* RECENT UI */
function updateRecentUI(){

if(recent.length === 0){
recentBox.innerText = "Recently viewed: None";
return;
}

recentBox.innerText =
"Recently viewed: " + recent.join(", ");
}

/* SEARCH */
document.getElementById("searchBox")
.addEventListener("input", e => {

const val = e.target.value.toLowerCase();

let list = getFiltered().filter(r =>
r.title.toLowerCase().includes(val)
);

render(list);

});

/* LOADING SKELETON */
function showSkeleton(){

grid.innerHTML = "";

for(let i=0;i<6;i++){
grid.innerHTML += `<div class="skeleton"></div>`;
}

}

/* INIT */
document.addEventListener("DOMContentLoaded", async () => {

showSkeleton();

try{

const res = await fetch("./data/arabic-recipes.json");
recipes = await res.json();

render(recipes);
updateRecentUI();

}catch(err){

grid.innerHTML = "Failed to load data";
console.error(err);

}

});

</script>

</body>
</html>
