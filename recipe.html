<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

.card{
  max-width:700px;
  margin:auto;
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const id = new URLSearchParams(location.search).get("id");
const box = document.getElementById("content");

try {
  const res = await fetch("./data/arabic-recipes.json");
  const data = await res.json();

  const recipe = data.find(r => r.id == id);

  if(!recipe){
    box.innerHTML = "Recipe not found";
    return;
  }

  box.innerHTML = `
    <h1>${recipe.title}</h1>
    <p>${recipe.time} • ${recipe.difficulty}</p>

    <h3>Ingredients</h3>
    <ul>
      ${recipe.ingredients.map(i => `<li>${i}</li>`).join("")}
    </ul>

    <h3>Steps</h3>
    <ol>
      ${recipe.steps.map(s => `<li>${s}</li>`).join("")}
    </ol>
  `;

} catch (err) {
  console.log(err);
  box.innerHTML = "❌ Failed to load recipe";
}

});
</script>

</body>
</html>
