<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:35px;
height:35px;
border-radius:8px;
}

.hero{
height:250px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.3));
}

.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:2;
}

.container{
padding:15px;
}

.card{
background:#151c25;
padding:15px;
border-radius:14px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.group-title{
margin-top:15px;
margin-bottom:6px;
font-weight:bold;
color:#ffcc70;
}

/* INGREDIENTS */
.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
background:#1b2430;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
}

/* INSTRUCTIONS */
.instructions .step{
background:#1b2430;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

/* CHEF TIPS (FIXED - NO BOX BACKGROUND) */
.chef-tips{
list-style: disc;
padding-left:20px;
margin-top:8px;
}

.chef-tips li{
margin-bottom:6px;
font-size:13px;
line-height:1.5;
color:#ddd;
}

.section-title{
margin-top:18px;
margin-bottom:8px;
color:#ffcc70;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe</strong>
</header>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">← Back</button>
</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const file = new URLSearchParams(location.search).get("file");
const content = document.getElementById("content");
const hero = document.getElementById("hero");

if (!file) {
content.innerHTML = "Recipe not found";
return;
}

try {

const res = await fetch(file);
const recipe = await res.json();

/* HERO */
hero.style.backgroundImage = `url('${recipe.image || ""}')`;

/* INGREDIENTS */
function renderIngredient(item){

if(typeof item === "string"){
return `
<label>
<span>${item}</span>
<input type="checkbox">
</label>
`;
}

if(typeof item === "object" && item !== null){

if(item.title && Array.isArray(item.items)){
return `
<div>
<div class="group-title">${item.title}</div>
${item.items.map(renderIngredient).join("")}
</div>
`;
}

return `<label><span>${JSON.stringify(item)}</span></label>`;
}

return "";
}

let ingredientsHTML = "";
if(Array.isArray(recipe.ingredients)){
ingredientsHTML = recipe.ingredients.map(renderIngredient).join("");
}

/* INSTRUCTIONS */
let stepsHTML = "";

if(Array.isArray(recipe.instruction)){
stepsHTML = recipe.instruction.map(section => `
<div>
<div class="group-title">${section.title}</div>
${section.steps.map(step => `
<div class="step" onclick="toggleStep(this)">
${step}
</div>
`).join("")}
</div>
`).join("");
}

/* CHEF TIPS - CLEAN BULLETS ONLY */
let tipsHTML = "";

if(Array.isArray(recipe.chefTips)){
tipsHTML = `
<ul class="chef-tips">
${recipe.chefTips.map(t => `<li>${t}</li>`).join("")}
</ul>
`;
}

/* FINAL UI */
content.innerHTML = `
<h1>${recipe.title || ""}</h1>

<div class="meta">
<span>⏱ ${recipe.time || ""}</span>
<span>🔥 ${recipe.difficulty || ""}</span>
<span>🍽 ${recipe.category || ""}</span>
</div>

<h3 class="section-title">Ingredients</h3>
<div class="ingredients">${ingredientsHTML}</div>

<h3 class="section-title">Instructions</h3>
<div class="instructions">${stepsHTML}</div>

<h3 class="section-title">Chef Tips</h3>
<div>${tipsHTML}</div>
`;

} catch(err){
content.innerHTML = "Failed to load recipe";
}

});

function toggleStep(el){
el.classList.toggle("done");
}

</script>

</body>
</html>
