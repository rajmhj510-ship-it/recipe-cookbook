<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#0b0f14;
  color:#fff;
}

.hero{
  height:250px;
  background-size:cover;
  position:relative;
}

.back{
  position:absolute;
  top:10px;
  left:10px;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#000;
  color:#fff;
}

.container{
  max-width:800px;
  margin:auto;
  padding:15px;
}

.card{
  background:#151c25;
  padding:15px;
  border-radius:14px;
}

span{
  display:inline-block;
  margin:5px;
  background:#222;
  padding:5px 10px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="hero" id="hero">
  <button class="back" onclick="history.back()">Back</button>
</div>

<div class="container">
  <div class="card" id="content">Loading...</div>
</div>

<script>
const id = new URLSearchParams(location.search).get("id");

fetch("data/arabic-recipes.json")
.then(r => r.json())
.then(data => {

  const recipe = data.find(x => x.id == id);

  if(!recipe){
    document.getElementById("content").innerHTML = "Not found";
    return;
  }

  document.getElementById("hero").style.backgroundImage =
    `url('${recipe.image}')`;

  document.getElementById("content").innerHTML = `
    <h1>${recipe.title}</h1>
    <p>${recipe.time} • ${recipe.difficulty}</p>

    <h3>Ingredients</h3>
    ${recipe.ingredients.map(i => `<span>${i}</span>`).join("")}

    <h3>Steps</h3>
    ${recipe.steps.map(s => `<p>• ${s}</p>`).join("")}
  `;
});
</script>

</body>
</html>
