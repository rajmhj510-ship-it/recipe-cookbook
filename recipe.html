<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body { font-family: Arial; margin: 0; background:#f5f5f5; }

#hero {
	width:100%;
	max-width:900px;
	height:520px;
	margin:20px auto;
	border-radius:12px;
	background-size:cover;
	background-position:center;
}

.recipe-title {
	max-width:900px;
	margin:20px auto;
	font-size:2rem;
	color:#082a7b;
}

.container { max-width:900px; margin:auto; padding:20px; }

.section {
	background:#fff;
	padding:15px;
	margin-bottom:15px;
	border-radius:10px;
}

.step {
	padding:8px;
	background:#eee;
	margin:5px 0;
	cursor:pointer;
}

.step.done {
	text-decoration:line-through;
	opacity:0.6;
}
</style>
</head>

<body>

<div id="hero"></div>
<div class="recipe-title" id="title"></div>
<div class="container" id="content"></div>

<script src="js/recipe.js"></script>

</body>
</html>
