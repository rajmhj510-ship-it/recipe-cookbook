<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:35px;
height:35px;
border-radius:8px;
}

.hero{
height:250px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.3));
}

.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:2;
}

.container{
padding:15px;
}

.card{
background:#151c25;
padding:15px;
border-radius:14px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* SECTION TITLES */
.section-title{
margin-top:15px;
margin-bottom:8px;
color:#ffcc70;
font-weight:bold;
}

/* INGREDIENTS */
.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
background:#1b2430;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
}

/* STEPS */
.instructions .step{
background:#1b2430;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

/* LIST BOX */
.list-box{
background:#1b2430;
padding:8px;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
}

</style>
</head>

<body>

<header>
<img src="./logo.png" alt="logo">
<strong>Recipe</strong>
</header>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">← Back</button>
</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const content = document.getElementById("content");
const hero = document.getElementById("hero");

const file = new URLSearchParams(location.search).get("file");

if(!file){
content.innerHTML = "❌ Recipe not found";
return;
}

try {

const res = await fetch(decodeURIComponent(file));

if(!res.ok){
throw new Error("Failed to load file");
}

const recipe = await res.json();

/* HERO */
hero.style.backgroundImage = `url('${recipe.image || ""}')`;

/* ---------------- INGREDIENTS FIX ---------------- */
let ingredientsHTML = "";

if(Array.isArray(recipe.ingredients)) {

recipe.ingredients.forEach(item => {

if(typeof item === "string") {
ingredientsHTML += `
<label>
<span>${item}</span>
<input type="checkbox">
</label>
`;
}
else if(item && typeof item === "object") {
ingredientsHTML += `<div class="section-title">${item.title}</div>`;

(item.items || []).forEach(i => {
ingredientsHTML += `
<label>
<span>${i}</span>
<input type="checkbox">
</label>
`;
});
}

});

}

/* ---------------- STEPS ---------------- */
let stepsHTML = "";
if(Array.isArray(recipe.steps)) {
stepsHTML = recipe.steps.map(s => `
<div class="step" onclick="toggleStep(this)">
${s}
</div>
`).join("");
}

/* ---------------- CHEF TIPS FIX ---------------- */
let tipsHTML = "";

if(Array.isArray(recipe.chefTips)) {
tipsHTML = `
<div class="section-title">Chef Tips</div>
${recipe.chefTips.map(t => `
<div class="list-box">${t}</div>
`).join("")}
`;
}

content.innerHTML = `
<h1>${recipe.title || ""}</h1>

<div class="meta">
<span>⏱ ${recipe.time || ""}</span>
<span>🔥 ${recipe.difficulty || ""}</span>
<span>🍽 ${recipe.category || ""}</span>
</div>

<h3 class="section-title">Ingredients</h3>
<div class="ingredients">
${ingredientsHTML}
</div>

<h3 class="section-title">Instructions</h3>
<div class="instructions">
${stepsHTML}
</div>

${tipsHTML}

`;

} catch(err){
console.error(err);
content.innerHTML = "❌ Failed to load recipe";
}

});

function toggleStep(el){
el.classList.toggle("done");
}

</script>

</body>
</html>
