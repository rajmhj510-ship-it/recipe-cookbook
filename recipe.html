<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:35px;
height:35px;
border-radius:8px;
}

.hero{
height:260px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.4));
}

.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:2;
}

.container{
padding:15px;
}

.card{
background:#151c25;
padding:15px;
border-radius:14px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* INGREDIENTS */
.group-title{
margin-top:12px;
margin-bottom:6px;
font-weight:bold;
color:#ffcc70;
}

.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
background:#1b2430;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
}

/* STEPS */
.instructions .step{
background:#1b2430;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe</strong>
</header>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">← Back</button>
</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const content = document.getElementById("content");
const hero = document.getElementById("hero");

const params = new URLSearchParams(location.search);
const file = params.get("file");

if(!file){
content.innerHTML = "❌ Recipe not found";
return;
}

/* ✅ IMPORTANT FIX: normalize path for GitHub Pages */
function normalizePath(path){
return decodeURIComponent(path)
.replace("./", "")
.replace(/^\/+/, "");
}

const cleanFile = normalizePath(file);

try {

/* fetch correct file */
const res = await fetch(cleanFile);

if(!res.ok){
throw new Error("Cannot load: " + cleanFile);
}

const recipe = await res.json();

/* HERO IMAGE FIX */
const img = recipe.image
? recipe.image.replace("./", "").replace(/^\/+/, "")
: "";

hero.style.backgroundImage = `url('${img}')`;

/* INGREDIENTS SUPPORT (flat OR grouped) */
let ingredientsHTML = "";

if(Array.isArray(recipe.ingredients)) {

if(typeof recipe.ingredients[0] === "string") {
ingredientsHTML = recipe.ingredients.map(i => `
<label>
<span>${i}</span>
<input type="checkbox">
</label>
`).join("");
} else {
recipe.ingredients.forEach(group => {
ingredientsHTML += `<div class="group-title">${group.title}</div>`;
ingredientsHTML += (group.items || []).map(i => `
<label>
<span>${i}</span>
<input type="checkbox">
</label>
`).join("");
});
}
}

/* STEPS */
const steps = recipe.steps || recipe.instructions || [];

const stepsHTML = steps.map(step => `
<div class="step" onclick="toggleStep(this)">
${step}
</div>
`).join("");

content.innerHTML = `
<h1>${recipe.title || ""}</h1>

<div class="meta">
<span>⏱ ${recipe.time || ""}</span>
<span>🔥 ${recipe.difficulty || ""}</span>
<span>🍽 ${recipe.category || ""}</span>
</div>

<h3>Ingredients</h3>
<div class="ingredients">${ingredientsHTML}</div>

<h3>Instructions</h3>
<div class="instructions">${stepsHTML}</div>
`;

} catch(err){
console.error(err);
content.innerHTML = "❌ Failed to load recipe (check file path)";
}

});

function toggleStep(el){
el.classList.toggle("done");
}
</script>

</body>
</html>
