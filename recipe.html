<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* HEADER */
header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:35px;
height:35px;
border-radius:8px;
}

/* HERO */
.hero{
height:250px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.3));
}

/* BACK BUTTON */
.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:3;
}

/* HERO IMAGE BOX */
.hero-image-box{
position:absolute;
bottom:12px;
right:12px;
width:110px;
height:80px;
border-radius:10px;
overflow:hidden;
cursor:pointer;
border:2px solid #fff;
z-index:3;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.hero-image-box img{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

.hero-image-box:hover img{
transform:scale(1.05);
}

/* CONTENT */
.container{
padding:15px;
}

.card{
background:#151c25;
padding:15px;
border-radius:14px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

/* META */
.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* SECTION TITLES */
.section-title{
margin-top:18px;
margin-bottom:8px;
font-weight:bold;
color:#ffcc70;
}

/* SUB TITLES */
.section-title.sub{
color:#7dd3fc;
font-size:14px;
font-weight:600;
margin-top:12px;
margin-bottom:6px;
}

/* INGREDIENTS */
.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
background:#1b2430;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
color:#cbd5e1;
}

/* INSTRUCTIONS */
.instructions .step{
background:#1b2430;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
color:#cbd5e1;
}

.instructions .step:hover{
background:#243041;
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

/* CHEF TIPS */
.chef-tips{
list-style:disc;
padding-left:20px;
margin-top:8px;
}

.chef-tips li{
margin-bottom:6px;
font-size:13px;
line-height:1.5;
color:#b6c2d1;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.modal .close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
color:#fff;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe</strong>
</header>

<div class="hero" id="hero">

<button class="back" onclick="history.back()">← Back</button>

<div class="hero-image-box" onclick="openImage()">
<img id="recipeImage" src="">
</div>

</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<!-- IMAGE MODAL -->
<div id="imgModal" class="modal" onclick="closeImage()">
<span class="close">&times;</span>
<img id="modalImg">
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const file = new URLSearchParams(location.search).get("file");
const content = document.getElementById("content");
const hero = document.getElementById("hero");

if (!file) {
content.innerHTML = "Recipe not found";
return;
}

try {

const res = await fetch(file);
const recipe = await res.json();

/* HERO */
if (recipe.image) {
hero.style.backgroundImage = `url('${recipe.image}')`;
document.getElementById("recipeImage").src = recipe.image;
}

/* INGREDIENTS */
function renderIngredient(item){

if(typeof item === "string"){
return `
<label>
<span>${item}</span>
<input type="checkbox">
</label>
`;
}

if(typeof item === "object" && item !== null){

if(item.title && Array.isArray(item.items)){
return `
<div>
<div class="section-title sub">${item.title}</div>
${item.items.map(renderIngredient).join("")}
</div>
`;
}

return `<label><span>${JSON.stringify(item)}</span></label>`;
}

return "";
}

let ingredientsHTML = "";

if(Array.isArray(recipe.ingredients)){
ingredientsHTML = recipe.ingredients.map(renderIngredient).join("");
}

/* INSTRUCTIONS */
let stepsHTML = "";

if(Array.isArray(recipe.instruction)){
stepsHTML = recipe.instruction.map(section => `
<div>
<div class="section-title sub">${section.title}</div>
${section.steps.map(step => `
<div class="step" onclick="toggleStep(this)">
${step}
</div>
`).join("")}
</div>
`).join("");
}

/* CHEF TIPS */
let tipsHTML = "";

if(Array.isArray(recipe.chefTips)){
tipsHTML = `
<ul class="chef-tips">
${recipe.chefTips.map(t => `<li>${t}</li>`).join("")}
</ul>
`;
}

/* FINAL UI */
content.innerHTML = `
<h1>${recipe.title || ""}</h1>

<div class="meta">
<span>⏱ ${recipe.time || ""}</span>
<span>🔥 ${recipe.difficulty || ""}</span>
<span>🍽 ${recipe.category || ""}</span>
</div>

<h3 class="section-title">Ingredients</h3>
<div class="ingredients">${ingredientsHTML}</div>

<h3 class="section-title">Instructions</h3>
<div class="instructions">${stepsHTML}</div>

<h3 class="section-title">Chef Tips</h3>
<div>${tipsHTML}</div>
`;

} catch(err){
content.innerHTML = "Failed to load recipe";
}

});

/* STEP TOGGLE */
function toggleStep(el){
el.classList.toggle("done");
}

/* IMAGE POPUP */
function openImage(){
const img = document.getElementById("recipeImage").src;
document.getElementById("modalImg").src = img;
document.getElementById("imgModal").style.display = "flex";
}

function closeImage(){
document.getElementById("imgModal").style.display = "none";
}

</script>

</body>
</html>
