<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body { font-family: Arial; margin: 0; background:#f5f5f5; }

#hero {
	width:100%;
	max-width:900px;
	height:520px;
	margin:20px auto;
	border-radius:12px;
	background-size:cover;
	background-position:center;
}

.recipe-title {
	max-width:900px;
	margin:20px auto;
	font-size:2rem;
	color:#082a7b;
}

.container { max-width:900px; margin:auto; padding:20px; }

.section {
	background:#fff;
	padding:15px;
	margin-bottom:15px;
	border-radius:10px;
}
.step { padding:8px; background:#eee; margin:5px 0; cursor:pointer; }
.step.done { text-decoration:line-through; opacity:0.6; }
</style>
</head>

<body>

<div id="hero"></div>
<div class="recipe-title" id="title"></div>
<div class="container" id="content"></div>

<script>
const ALLOWED = [];

async function init() {
	const raw = new URLSearchParams(location.search).get("file") || "";
	const file = decodeURIComponent(raw);

	const resList = await fetch("data/index.json");
	const list = await resList.json();

	list.forEach(i => ALLOWED.push(i.file));

	if (!ALLOWED.includes(file)) {
		document.body.innerHTML = "<h2>Access denied</h2>";
		return;
	}

	const res = await fetch(file);
	const r = await res.json();

	document.getElementById("hero").style.backgroundImage =
		`url('${r.image}')`;

	document.getElementById("title").textContent = r.title;

	document.getElementById("content").innerHTML =
		r.ingredients.map(g =>
			`<div class="section"><h3>${g.title}</h3>
			<ul>${g.items.map(i => `<li>${i}</li>`).join("")}</ul></div>`
		).join("") +
		r.instruction.map(s =>
			`<div class="section"><h3>${s.title}</h3>
			${s.steps.map(step =>
				`<div class="step" onclick="this.classList.toggle('done')">${step}</div>`
			).join("")}</div>`
		).join("") +
		`<div class="section"><h3>Tips</h3><ul>${
			(r.chefTips || []).map(t => `<li>${t}</li>`).join("")
		}</ul></div>`;
}

init();
</script>

</body>
</html>
