<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* HEADER */
header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:35px;
height:35px;
border-radius:8px;
}

/* HERO */
.hero{
height:260px;
position:relative;
overflow:hidden;
background:#000;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.3));
pointer-events:none;
}

/* BACK */
.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
z-index:5;
}

/* SWIPE CONTAINER */
.slider{
display:flex;
height:100%;
transition:transform 0.3s ease;
}

.slide{
min-width:100%;
height:260px;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* DOTS */
.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:5;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#666;
}

.dot.active{
background:#fff;
}

/* CONTENT */
.container{
padding:15px;
}

.card{
background:#151c25;
padding:15px;
border-radius:14px;
}

/* TITLES */
.section-title{
margin-top:18px;
margin-bottom:8px;
color:#ffcc70;
font-weight:bold;
}

.section-title.sub{
color:#7dd3fc;
font-size:14px;
}

/* INGREDIENTS */
.ingredients label{
display:flex;
justify-content:space-between;
padding:8px;
background:#1b2430;
border-radius:8px;
margin-bottom:6px;
color:#cbd5e1;
}

/* STEPS */
.instructions .step{
background:#1b2430;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
color:#cbd5e1;
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

/* CHEF TIPS */
.chef-tips{
list-style:disc;
padding-left:20px;
}

.chef-tips li{
color:#b6c2d1;
margin-bottom:6px;
font-size:13px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
flex-direction:column;
}

.modal img{
max-width:90%;
max-height:80%;
}

.modal .close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe</strong>
</header>

<div class="hero">

<button class="back" onclick="history.back()">← Back</button>

<div class="slider" id="slider"></div>

<div class="dots" id="dots"></div>

</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<span class="close">&times;</span>
<img id="modalImg">
</div>

<script>

let currentIndex = 0;
let images = [];

document.addEventListener("DOMContentLoaded", async () => {

const file = new URLSearchParams(location.search).get("file");
const res = await fetch(file);
const recipe = await res.json();

/* IMAGES */
images = recipe.images || [recipe.image];

renderSlider();
renderContent(recipe);

});

/* SLIDER */
function renderSlider(){
const slider = document.getElementById("slider");
const dots = document.getElementById("dots");

slider.innerHTML = images.map(img => `
<div class="slide" onclick="openModal()">
<img src="${img}">
</div>
`).join("");

dots.innerHTML = images.map((_,i)=>`
<div class="dot ${i===0?'active':''}"></div>
`).join("");

// swipe support
let startX = 0;

slider.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e=>{
let endX = e.changedTouches[0].clientX;

if(startX - endX > 50){
nextSlide();
}
if(endX - startX > 50){
prevSlide();
}
});
}

function updateSlider(){
document.getElementById("slider").style.transform = `translateX(-${currentIndex*100}%)`;

document.querySelectorAll(".dot").forEach((d,i)=>{
d.classList.toggle("active", i===currentIndex);
});
}

function nextSlide(){
if(currentIndex < images.length - 1){
currentIndex++;
updateSlider();
}
}

function prevSlide(){
if(currentIndex > 0){
currentIndex--;
updateSlider();
}
}

/* MODAL */
function openModal(){
document.getElementById("modalImg").src = images[currentIndex];
document.getElementById("modal").style.display = "flex";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

/* CONTENT (simple reuse from your previous logic) */
function renderContent(recipe){

document.getElementById("content").innerHTML = `
<h1>${recipe.title}</h1>

<div class="meta">
<span>⏱ ${recipe.time}</span>
<span>🔥 ${recipe.difficulty}</span>
<span>🍽 ${recipe.category}</span>
</div>

<h3 class="section-title">Ingredients</h3>
<div class="ingredients">
${recipe.ingredients?.map(g=>g.items?.map(i=>`<label>${i}</label>`).join("")).join("")}
</div>

<h3 class="section-title">Instructions</h3>
<div class="instructions">
${recipe.instruction?.map(s=>`
<div class="step">${s.title}</div>
${s.steps.map(st=>`<div class="step">${st}</div>`).join("")}
`).join("")}
</div>

<h3 class="section-title">Chef Tips</h3>
<ul class="chef-tips">
${recipe.chefTips?.map(t=>`<li>${t}</li>`).join("")}
</ul>
`;
}

</script>

</body>
</html>
