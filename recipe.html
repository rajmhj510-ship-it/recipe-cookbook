<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>
body {
	font-family: Arial;
	margin: 0;
	background: #f5f5f5;
}

/* HERO IMAGE */
#hero {
	width: 100%;
	max-width: 900px;
	height: 520px;
	margin: 20px auto 0;
	border-radius: 12px;
	background-size: cover;
	background-position: center;
	box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* TITLE */
.recipe-title {
	max-width: 900px;
	margin: 20px auto 10px;
	font-size: 2.2rem;
	font-weight: bold;
	color: #082a7b;
	padding: 0 10px;
}

/* CONTENT */
.container {
	padding: 20px;
	max-width: 900px;
	margin: auto;
}

/* SECTION */
.section {
	background: white;
	padding: 15px;
	margin-bottom: 15px;
	border-radius: 10px;
	box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

.section h2 {
	margin-bottom: 10px;
	color: #082a7b;
}

/* LIST */
ul {
	padding-left: 20px;
}

li {
	margin-bottom: 6px;
}

/* STEPS */
.step {
	padding: 8px;
	background: #f2f2f2;
	margin: 6px 0;
	border-radius: 8px;
	cursor: pointer;
}

.step.done {
	text-decoration: line-through;
	opacity: 0.6;
}
</style>
</head>

<body>

<!-- HERO IMAGE -->
<div id="hero"></div>

<!-- RECIPE TITLE -->
<div class="recipe-title" id="recipeTitle"></div>

<!-- CONTENT -->
<div class="container" id="content"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

	const file = new URLSearchParams(location.search).get("file");

	const content = document.getElementById("content");
	const hero = document.getElementById("hero");
	const titleEl = document.getElementById("recipeTitle");

	if (!file) {
		content.innerHTML = "<h2>Recipe not found ❌</h2>";
		return;
	}

	try {
		const res = await fetch(file);
		if (!res.ok) throw new Error("File not found");

		const recipe = await res.json();

		// HERO IMAGE
		hero.style.backgroundImage = `url('${recipe.image}')`;

		// RECIPE NAME
		titleEl.textContent = recipe.title;

		// INGREDIENTS
		let ingredientsHTML = `
			<div class="section">
				<h2> Ingredients</h2>
		`;

		recipe.ingredients.forEach(group => {
			ingredientsHTML += `
				<h3>${group.title}</h3>
				<ul>
					${group.items.map(i => `<li>${i}</li>`).join("")}
				</ul>
			`;
		});

		ingredientsHTML += `</div>`;

		// INSTRUCTIONS
		let instructionHTML = `
			<div class="section">
				<h2> Instructions</h2>
		`;

		recipe.instruction.forEach(section => {
			instructionHTML += `
				<h3>${section.title}</h3>
				${section.steps.map(step =>
					`<div class="step" onclick="toggleStep(this)">${step}</div>`
				).join("")}
			`;
		});

		instructionHTML += `</div>`;

		// CHEF TIPS
		let tipsHTML = `
			<div class="section">
				<h2> Chef Tips</h2>
				<ul>
					${recipe.chefTips.map(tip => `<li>${tip}</li>`).join("")}
				</ul>
			</div>
		`;

		// RENDER ALL
		content.innerHTML = ingredientsHTML + instructionHTML + tipsHTML;

	} catch (err) {
		console.error(err);
		content.innerHTML = "<h2>Failed to load recipe ❌</h2>";
	}
});

// STEP TOGGLE
function toggleStep(el) {
	el.classList.toggle("done");
}
</script>

</body>
</html>
