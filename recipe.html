<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

header img{
width:35px;
height:35px;
border-radius:8px;
}

.hero{
height:250px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#0b0f14,rgba(0,0,0,0.2));
}

.back{
position:absolute;
top:12px;
left:12px;
padding:8px 12px;
border:none;
border-radius:20px;
background:rgba(0,0,0,0.6);
color:#fff;
cursor:pointer;
}

.container{
padding:15px;
}

.card{
background:#151c25;
padding:15px;
border-radius:14px;
}

h1{font-size:20px;margin-bottom:10px;}

.meta{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.meta span{
background:#222c3a;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

h3{
margin-top:15px;
}

.ingredients label{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
background:#1b2430;
border-radius:8px;
margin-bottom:6px;
font-size:13px;
}

.instructions .step{
background:#1b2430;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
}

.step.done{
opacity:0.6;
border-left:3px solid #00c853;
}

</style>
</head>

<body>

<header>
<img src="./logo.png">
<strong>Recipe</strong>
</header>

<div class="hero" id="hero">
<button class="back" onclick="history.back()">← Back</button>
</div>

<div class="container">
<div class="card" id="content">Loading...</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

const file = new URLSearchParams(location.search).get("file");

const content = document.getElementById("content");
const hero = document.getElementById("hero");

if(!file){
content.innerHTML = "Recipe not found";
return;
}

try {

const res = await fetch("./data/" + file);
const recipe = await res.json();

/* HERO IMAGE */
hero.style.backgroundImage = `url('${recipe.image}')`;

content.innerHTML = `
<h1>${recipe.title}</h1>

<div class="meta">
<span>⏱ ${recipe.time || ""}</span>
<span>🔥 ${recipe.difficulty || ""}</span>
<span>🍽 ${recipe.category || ""}</span>
</div>

<h3>Ingredients</h3>
<div class="ingredients">
${recipe.ingredients.map(i => `
<label>
<span>${i}</span>
<input type="checkbox">
</label>
`).join("")}
</div>

<h3>Instructions</h3>
<div class="instructions">
${recipe.instructions.map(s => `
<div class="step" onclick="toggleStep(this)">
${s}
</div>
`).join("")}
</div>
`;

} catch(err){
console.error(err);
content.innerHTML = "Failed to load recipe";
}

});

function toggleStep(el){
el.classList.toggle("done");
}

</script>

</body>
</html>
